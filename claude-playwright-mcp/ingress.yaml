apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: playwright-mcp
  namespace: claude-playwright-mcp
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: basic-auth
    nginx.ingress.kubernetes.io/auth-realm: "Authentication Required"
    # Streamable HTTP MCP — same SSE/chunked pattern as other MCP deployments.
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: playwright.mcp.k3s.fluv.net
      http:
        paths:
          - path: /mcp
            pathType: Prefix
            backend:
              service:
                name: playwright-mcp
                port:
                  name: http
  tls:
    - hosts:
        - playwright.mcp.k3s.fluv.net
      secretName: playwright-mcp-k3s-fluv-net-tls
