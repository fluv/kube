apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: playwright-mcp
  namespace: claude-playwright-mcp
  labels:
    release: prometheus
spec:
  groups:
    - name: playwright-mcp-memory
      rules:
        # With --shared-browser-context, browser heap accumulates across calls.
        # Alert at 80% of the 2Gi limit to give time to investigate before OOMKill.
        - alert: PlaywrightMcpMemoryHigh
          expr: |
            container_memory_working_set_bytes{
              namespace="claude-playwright-mcp",
              container="playwright-mcp"
            } / 2e9 > 0.8
          for: 10m
          labels:
            severity: warning
            component: playwright-mcp
          annotations:
            summary: "playwright-mcp memory > 1.6Gi (80% of 2Gi limit)"
            description: "Accumulated browser state may be growing with --shared-browser-context. If memory stays high, consider restarting the pod to release browser heap."

    - name: playwright-mcp-ingress
      rules:
        # If the basic-auth secret goes missing or is misconfigured the
        # nginx-ingress controller returns 503 for every request without
        # surfacing the failure anywhere obvious. Same pattern as printer-mcp.
        - alert: PlaywrightMcpIngress5xx
          expr: |
            sum by (ingress) (
              rate(nginx_ingress_controller_requests{
                exported_namespace="claude-playwright-mcp",
                status=~"5.."
              }[5m])
            ) > 0.05
          for: 5m
          labels:
            severity: warning
            component: playwright-mcp
          annotations:
            summary: "playwright-mcp ingress serving 5xx ({{ $value | humanize }} req/s)"
            description: "ingress-nginx is returning 5xx from {{ $labels.ingress }}. Most likely cause: basic-auth secret missing or malformed in claude-playwright-mcp namespace."
