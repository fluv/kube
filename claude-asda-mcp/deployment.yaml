apiVersion: apps/v1
kind: Deployment
metadata:
  name: asda-mcp
  namespace: claude-asda-mcp
spec:
  # Single replica is load-bearing: the MCP SDK's StreamableHTTP transport
  # keeps per-session state in memory. Multiple replicas would serve
  # incompatible sessions depending on which pod a request hits.
  #
  # Scaled to zero: Claude usage paused (#748). Restore with `git revert`.
  replicas: 0
  selector:
    matchLabels:
      app: asda-mcp
  template:
    metadata:
      labels:
        app: asda-mcp
    spec:
      containers:
        - name: asda-mcp
          image: ghcr.io/fluv/asda-mcp:main@sha256:669407d8673515fd4a05a8e088ad52e71f2498573d9d7cb2ada757be27ae8737
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 256Mi
