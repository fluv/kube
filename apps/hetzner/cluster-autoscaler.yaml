apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hcloud-cluster-autoscaler
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: hetzner
  source:
    repoURL: https://kubernetes.github.io/autoscaler
    targetRevision: 9.*.*
    chart: cluster-autoscaler
    helm:
      valuesObject:
        image:
          tag: v1.33.4
        cloudProvider: hetzner
        autoscalingGroups: # hard quota enforced on hetzner side of 5 servers
          - name: hetz-4gb-nbg1 # included in case hel1 is oversubscribed
            minSize: 0
            maxSize: 2
            instanceType: cx23 # 4.79 EUR/mo
            region: nbg1
          - name: hetz-4gb-hel1
            minSize: 0
            maxSize: 3
            instanceType: cx23
            region: hel1
          - name: hetz-8gb-hel1
            minSize: 1
            maxSize: 2
            instanceType: cx33 # 7.79 EUR/mo
            region: hel1
          - name: hetz-16gb-hel1
            minSize: 1
            maxSize: 1
            instanceType: cx43 # 14.39 EUR/mo
            region: hel1
          - name: hetz-32gb-hel1
            minSize: 0
            maxSize: 0
            instanceType: cx53 # 26.99 EUR/mo
            region: hel1
        extraEnv:
          HCLOUD_PUBLIC_IPV4: "true" # k3s install script needs GitHub which is IPv4 only
          HCLOUD_NETWORK: k3s-private # attach new nodes to the Hetzner private network
        extraEnvSecrets:
          HCLOUD_TOKEN:
            name: hcloud
            key: token
          # HCLOUD_CLUSTER_CONFIG replaces the legacy HCLOUD_CLOUD_INIT + HCLOUD_IMAGE pair.
          # Carries per-pool cloudInit + labels (incl. kubernetes.io/os=linux so the
          # autoscaler's template-scheduling check passes for pods that nodeSelect on it).
          # Rendered by hetzner/update-cluster-config-secret.py.
          HCLOUD_CLUSTER_CONFIG:
            name: hcloud-init-data
            key: cluster-config
        extraArgs:
          scale-down-delay-after-add: 50m
          scale-down-unneeded-time: 5m
          skip-nodes-with-system-pods: "false"
          expander: priority
        # Prefer (arbitrarily selected) Helsinki over other regions; prefer CX33 over CX23 (better value)
        expanderPriorities: # higher fulfilled first
          10: # use only if large pods need it
            # - hetz-16gb-hel1
            - hetz-32gb-hel1
          20: # fallback
            - hetz-4gb-nbg1
          30: # secondary
            - hetz-4gb-hel1
          40: # primary
            - hetz-8gb-hel1
          50: # temporary
            - hetz-16gb-hel1
        hostNetwork: true
        tolerations:
          - key: node-role.kubernetes.io/control-plane
            effect: NoSchedule
          - key: node.kubernetes.io/unschedulable
            effect: NoSchedule
            operator: Exists
        priorityClassName: system-cluster-critical
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
