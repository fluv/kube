apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hcloud-cluster-autoscaler
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: hetzner
  source:
    repoURL: https://kubernetes.github.io/autoscaler
    targetRevision: 9.*.*
    chart: cluster-autoscaler
    helm:
      valuesObject:
        image:
          tag: v1.33.4
        cloudProvider: hetzner
        autoscalingGroups:
          - name: hetz-cx23-nbg1
            minSize: 1
            maxSize: 1
            instanceType: cx23
            region: nbg1
          - name: hetz-cx23-fsn1
            minSize: 0
            maxSize: 1
            instanceType: cx23
            region: fsn1
          - name: hetz-cx23-hel1
            minSize: 0
            maxSize: 1
            instanceType: cx23
            region: hel1
        extraEnv:
          HCLOUD_PUBLIC_IPV4: "true" # k3s install script needs GitHub which is IPv4 only
        extraEnvSecrets:
          HCLOUD_TOKEN:
            name: hcloud
            key: token
          # HCLOUD_CLUSTER_CONFIG replaces the legacy HCLOUD_CLOUD_INIT + HCLOUD_IMAGE pair.
          # Carries per-pool cloudInit + labels (incl. kubernetes.io/os=linux so the
          # autoscaler's template-scheduling check passes for pods that nodeSelect on it).
          # Rendered by hetzner/update-cluster-config-secret.py.
          HCLOUD_CLUSTER_CONFIG:
            name: hcloud-init-data
            key: cluster-config
        extraArgs:
          scale-down-delay-after-add: 50m
          scale-down-unneeded-time: 5m
          skip-nodes-with-system-pods: "false"
          expander: least-waste
        hostNetwork: true
        tolerations:
          - key: node-role.kubernetes.io/control-plane
            effect: NoSchedule
        priorityClassName: system-cluster-critical
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
