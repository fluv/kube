apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
spec:
  project: default
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  source:
    path: ''
    repoURL: https://argoproj.github.io/argo-helm
    targetRevision: 10.*
    chart: argo-cd
    helm:
      valuesObject:
        global:
          priorityClassName: cluster-critical
          domain: argocd.gentoo-mine.ts.net
        configs:
          cm:
            admin.enabled: false
            accounts.claude: apiKey
          params:
            server.insecure: "true"
            server.disable.auth: "true"
          rbac:
            policy.default: role:admin
        dex:
          enabled: false
        controller:
          # Explicit resources so the argocd LimitRange's 768Mi container
          # default doesn't apply — the controller OOMs below ~1Gi at this
          # cluster's app count (first seen 2026-07-03, first pod restart
          # since the LimitRange was added in April).
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 1536Mi
          metrics:
            enabled: true
            serviceMonitor:
              enabled: true
        server:
          metrics:
            enabled: true
            serviceMonitor:
              enabled: true
          ingress:
            enabled: true
            ingressClassName: tailscale
            annotations:
              tailscale.com/hostname: argocd
              tailscale.com/proxy-class: spread-across-nodes
            hosts:
              - argocd
            tls:
              - hosts:
                  - argocd
        repoServer:
          metrics:
            enabled: true
            serviceMonitor:
              enabled: true
        applicationSet:
          metrics:
            enabled: true
            serviceMonitor:
              enabled: true
