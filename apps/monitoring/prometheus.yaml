apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  project: monitoring
  source:
    path: charts/kube-prometheus-stack
    repoURL: https://github.com/prometheus-community/helm-charts.git
    targetRevision: HEAD
    helm:
      valuesObject:
        crds:
          enabled: false
        alertmanager:
          enabled: true
          ingress:
            enabled: true
            ingressClassName: tailscale
            pathType: ImplementationSpecific
            paths: [ / ]
            hosts:
              - alertmanager.gentoo-mine.ts.net
            tls:
              - hosts:
                  - alertmanager.gentoo-mine.ts.net
            annotations:
              tailscale.com/proxy-class: spread-across-nodes
          config:
            global:
              resolve_timeout: 5m
            route:
              group_by: ['alertname', 'namespace']
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 12h
              receiver: 'null'
            receivers:
              - name: 'null'
          alertmanagerSpec:
            priorityClassName: cluster-low
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: longhorn-durable
                  accessModes:
                    - ReadWriteOnce
                  resources:
                    requests:
                      storage: 1Gi
        grafana:
          enabled: false
        prometheus:
          ingress:
            enabled: true
            ingressClassName: tailscale
            pathType: ImplementationSpecific
            paths: [ / ]
            hosts:
              - prometheus.gentoo-mine.ts.net
            tls:
              - hosts:
                  - prometheus.gentoo-mine.ts.net
            annotations:
              tailscale.com/proxy-class: spread-across-nodes
          prometheusSpec:
            replicas: 1
            priorityClassName: cluster-low
            retention: 8d
            # Backstop against filling the 30Gi volume; kept above the ~16GB
            # that 8d of metrics occupies so time-based retention is the binding
            # limit. If raised, bump the PrometheusRetentionSizeCapBinding alert
            # threshold below in lockstep.
            retentionSize: 22GB
            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                memory: 2Gi
            podMonitorSelectorNilUsesHelmValues: false
            serviceMonitorSelectorNilUsesHelmValues: false
            startupProbe:
              failureThreshold: 60
              periodSeconds: 15
            livenessProbe:
              initialDelaySeconds: 0
              failureThreshold: 10
              periodSeconds: 30
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: instance.hetzner.cloud/provided-by
                          operator: In
                          values:
                            - cloud
            storageSpec:
              volumeClaimTemplate:
                metadata:
                  name: prom-hcloud-db
                spec:
                  storageClassName: hcloud-volumes
                  accessModes:
                    - ReadWriteOnce
                  resources:
                    requests:
                      storage: 30Gi
        additionalPrometheusRulesMap:
          prometheus-self-health:
            groups:
              - name: prometheus-retention
                rules:
                  - alert: PrometheusRetentionSizeCapBinding
                    # 19e9 ≈ 86% of the 22GB retentionSize cap. 8d of metrics
                    # occupies ~16GB, so this stays silent in normal operation;
                    # it fires only when on-disk blocks ride near the cap, i.e.
                    # size-based eviction is trimming data before the 8d time
                    # retention is reached. Keep in lockstep with retentionSize.
                    expr: prometheus_tsdb_storage_blocks_bytes{job="prometheus-kube-prometheus-prometheus"} > 19e9
                    for: 6h
                    labels:
                      severity: warning
                    annotations:
                      summary: "Prometheus retentionSize cap is the binding retention limit"
                      description: "On-disk blocks ({{ $value | humanize1024 }}B) are near the 22GB retentionSize cap, so metrics are being evicted on size before the 8d time retention is reached. Raise retentionSize/storage, or reduce ingested series."
        prometheusOperator:
          priorityClassName: cluster-low
          admissionWebhooks:
            certManager:
              enabled: true
        kubeEtcd:
          enabled: false
        kubeScheduler:
          enabled: false
        kubeProxy:
          enabled: false
        kubeControllerManager:
          enabled: false
        cleanPrometheusOperatorObjectNames: true
        kube-state-metrics:
          # kube-state-metrics exposes no label_* dimensions on kube_node_labels
          # unless the label is allowlisted here. HetznerNodeMissingDurableLabel
          # (hetzner/prometheusrule.yaml) needs both of these; without the
          # allowlist the rule evaluates against empty series and never fires.
          metricLabelsAllowlist:
            - nodes=[instance.hetzner.cloud/provided-by,storage.k3s.fluv.net/durable]
          rbac:
            extraRules:
              - apiGroups: [longhorn.io]
                resources: [backuptargets]
                verbs: [list, watch]
          customResourceState:
            enabled: true
            config:
              kind: CustomResourceStateMetrics
              spec:
                resources:
                  - groupVersionKind:
                      group: longhorn.io
                      version: v1beta2
                      kind: BackupTarget
                    metricNamePrefix: longhorn_backup_target
                    metrics:
                      - name: available
                        help: "Whether the Longhorn backup target is available (1 = available, 0 = not)"
                        each:
                          type: Gauge
                          gauge:
                            path: [status, available]
                            nilIsZero: true
        defaultRules:
          create: true
          rules:
            etcd: false
            kubeProxy: false
            kubeApiserverBurnrate: false
            kubeApiserverSlos: false
            kubeSchedulerAlerting: false
            kubeSchedulerRecording: false
            kubeControllerManager: false
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
