apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  project: monitoring
  source:
    path: charts/kube-prometheus-stack
    repoURL: https://github.com/prometheus-community/helm-charts.git
    targetRevision: HEAD
    helm:
      valuesObject:
        crds:
          enabled: false
        alertmanager:
          enabled: true
          ingress:
            enabled: true
            ingressClassName: tailscale
            pathType: ImplementationSpecific
            paths: [ / ]
            hosts:
              - alertmanager.gentoo-mine.ts.net
            tls:
              - hosts:
                  - alertmanager.gentoo-mine.ts.net
            annotations:
              tailscale.com/proxy-class: spread-across-nodes
          config:
            global:
              resolve_timeout: 5m
            route:
              group_by: ['alertname', 'namespace']
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 12h
              receiver: 'null'
            receivers:
              - name: 'null'
          alertmanagerSpec:
            priorityClassName: cluster-low
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: longhorn-durable
                  accessModes:
                    - ReadWriteOnce
                  resources:
                    requests:
                      storage: 1Gi
        grafana:
          enabled: false
        prometheus:
          ingress:
            enabled: true
            ingressClassName: tailscale
            pathType: ImplementationSpecific
            paths: [ / ]
            hosts:
              - prometheus.gentoo-mine.ts.net
            tls:
              - hosts:
                  - prometheus.gentoo-mine.ts.net
            annotations:
              tailscale.com/proxy-class: spread-across-nodes
          prometheusSpec:
            replicas: 1
            priorityClassName: cluster-low
            retention: 30d
            retentionSize: 25GB
            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                memory: 2Gi
            podMonitorSelectorNilUsesHelmValues: false
            serviceMonitorSelectorNilUsesHelmValues: false
            startupProbe:
              failureThreshold: 60
              periodSeconds: 15
            livenessProbe:
              initialDelaySeconds: 0
              failureThreshold: 10
              periodSeconds: 30
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: longhorn-durable
                  accessModes:
                    - ReadWriteOnce
                  resources:
                    requests:
                      storage: 30Gi
        prometheusOperator:
          priorityClassName: cluster-low
          admissionWebhooks:
            certManager:
              enabled: true
        kubeEtcd:
          enabled: false
        kubeScheduler:
          enabled: false
        kubeProxy:
          enabled: false
        kubeControllerManager:
          enabled: false
        cleanPrometheusOperatorObjectNames: true
        defaultRules:
          create: true
          rules:
            etcd: false
            kubeProxy: false
            kubeApiserverBurnrate: false
            kubeApiserverSlos: false
            kubeSchedulerAlerting: false
            kubeSchedulerRecording: false
            kubeControllerManager: false
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
