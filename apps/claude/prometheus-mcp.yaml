apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-mcp
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: claude
  source:
    repoURL: https://github.com/pab1it0/prometheus-mcp-server.git
    path: charts/prometheus-mcp-server
    targetRevision: HEAD
    helm:
      # Raw values string (not valuesObject): the chart defaults both probes to
      # httpGet, and only a literal null override removes that key during Helm's
      # coalesce. Without the null, the rendered probe carries two handler types
      # and the API server rejects it with "may not specify more than 1 handler
      # type". Matches prometheus-mcp-lifestyle.yaml.
      values: |
        # Scaled to zero: Claude usage paused (#748). Restore with `git revert`.
        replicaCount: 0
        prometheus:
          url: http://prometheus-claude.claude.svc.cluster.local:9090
          disableLinks: "true"
        mcp:
          transport: sse
        livenessProbe:
          httpGet: ~
          tcpSocket:
            port: http
        readinessProbe:
          httpGet: ~
          tcpSocket:
            port: http
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 128Mi
  destination:
    namespace: claude
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
