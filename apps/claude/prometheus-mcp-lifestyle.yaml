apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-mcp-lifestyle
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: claude
  source:
    repoURL: https://github.com/pab1it0/prometheus-mcp-server.git
    path: charts/prometheus-mcp-server
    targetRevision: HEAD
    helm:
      # Raw values string (not valuesObject): the chart defaults both probes to
      # httpGet, and only a literal null override removes that key during Helm's
      # coalesce. valuesObject is serialised to JSON and drops null fields before
      # Helm sees them, so the default httpGet survives and the rendered probe
      # carries two handler types — which the API server rejects. A raw values
      # string preserves the null, leaving tcpSocket as the sole handler.
      values: |
        # Scaled to zero: Claude usage paused (#748). Restore with `git revert`.
        replicaCount: 0
        prometheus:
          url: http://prometheus-lifestyle.lifestyle.svc.cluster.local:9090
          disableLinks: "true"
        mcp:
          transport: sse
        livenessProbe:
          httpGet: ~
          tcpSocket:
            port: http
        readinessProbe:
          httpGet: ~
          tcpSocket:
            port: http
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 128Mi
  destination:
    namespace: claude
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
