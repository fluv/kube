apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tf2-server
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: tf2
  project: default
  source:
    path: kube
    repoURL: https://github.com/fluv/tf2-server.git
    targetRevision: HEAD
    directory:
      recurse: true
  # The tf2-knocker (see tf2-knocker/) scales this deployment 0<->1 at
  # runtime; without these two settings selfHeal would immediately
  # revert every scale change back to the replica count in git.
  ignoreDifferences:
    - group: apps
      kind: Deployment
      name: tf2
      jsonPointers:
        - /spec/replicas
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
