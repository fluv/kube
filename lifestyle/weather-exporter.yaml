apiVersion: v1
kind: ConfigMap
metadata:
  name: weather-exporter
  namespace: lifestyle
data:
  weather-exporter.py: |
    #!/usr/bin/env python3
    """Prometheus exporter for outdoor weather via Open-Meteo API.

    Polls Open-Meteo every POLL_INTERVAL seconds and caches the result.
    Latitude and longitude are read from WEATHER_LATITUDE / WEATHER_LONGITUDE
    env vars, which must be populated from a Kubernetes Secret — never commit
    coordinates.
    """
    import math
    import os
    import threading
    import time
    import urllib.request
    import urllib.parse
    import json
    from http.server import BaseHTTPRequestHandler, HTTPServer

    PORT = int(os.environ.get('WEATHER_EXPORTER_PORT', '9096'))
    POLL_INTERVAL = 300  # 5 minutes; Open-Meteo updates ~every 15 min
    LATITUDE = os.environ['WEATHER_LATITUDE']
    LONGITUDE = os.environ['WEATHER_LONGITUDE']

    _lock = threading.Lock()
    _cache = {}  # populated by background thread


    def abs_humidity(temp_c, rh_pct):
        """Absolute humidity (g/m³) from dry-bulb temperature and relative humidity."""
        # Magnus formula saturation vapour pressure (hPa)
        svp = 6.112 * math.exp(17.67 * temp_c / (temp_c + 243.5))
        return svp * rh_pct * 2.1674 / (273.15 + temp_c)


    def fetch():
        params = urllib.parse.urlencode({
            'latitude': LATITUDE,
            'longitude': LONGITUDE,
            'current': 'temperature_2m,relative_humidity_2m,dew_point_2m',
            'timeformat': 'unixtime',
        })
        url = f'https://api.open-meteo.com/v1/forecast?{params}'
        with urllib.request.urlopen(url, timeout=15) as r:
            data = json.loads(r.read())
        current = data['current']
        temp = current['temperature_2m']
        rh = current['relative_humidity_2m']
        dp = current['dew_point_2m']
        ah = abs_humidity(temp, rh)
        return {'temp': temp, 'rh': rh, 'dp': dp, 'ah': ah, 'up': 1}


    def poll_loop():
        while True:
            try:
                result = fetch()
            except Exception as e:
                print(f'weather-exporter: fetch error: {e}', flush=True)
                result = {'up': 0}
            with _lock:
                _cache.update(result)
            time.sleep(POLL_INTERVAL)


    def metrics_text():
        with _lock:
            c = dict(_cache)

        up = c.get('up', 0)
        lines = [
            '# HELP weather_up 1 if last Open-Meteo fetch succeeded',
            '# TYPE weather_up gauge',
            f'weather_up {up}',
        ]
        if up:
            lines += [
                '# HELP weather_temperature_celsius Outdoor dry-bulb temperature (°C)',
                '# TYPE weather_temperature_celsius gauge',
                f'weather_temperature_celsius {c["temp"]}',
                '# HELP weather_humidity_percent Outdoor relative humidity (%)',
                '# TYPE weather_humidity_percent gauge',
                f'weather_humidity_percent {c["rh"]}',
                '# HELP weather_dew_point_celsius Outdoor dew point (°C)',
                '# TYPE weather_dew_point_celsius gauge',
                f'weather_dew_point_celsius {c["dp"]}',
                '# HELP weather_abs_humidity_gm3 Outdoor absolute humidity (g/m³)',
                '# TYPE weather_abs_humidity_gm3 gauge',
                f'weather_abs_humidity_gm3 {c["ah"]:.4f}',
            ]
        return '\n'.join(lines) + '\n'


    class Handler(BaseHTTPRequestHandler):
        def log_message(self, *args):
            pass  # suppress per-request access log

        def do_GET(self):
            if self.path != '/metrics':
                self.send_response(404)
                self.end_headers()
                return
            body = metrics_text().encode()
            self.send_response(200)
            self.send_header('Content-Type', 'text/plain; version=0.0.4; charset=utf-8')
            self.send_header('Content-Length', len(body))
            self.end_headers()
            self.wfile.write(body)


    if __name__ == '__main__':
        # Populate cache before starting server
        try:
            result = fetch()
        except Exception as e:
            print(f'weather-exporter: initial fetch error: {e}', flush=True)
            result = {'up': 0}
        _cache.update(result)

        threading.Thread(target=poll_loop, daemon=True).start()
        server = HTTPServer(('', PORT), Handler)
        print(f'weather-exporter listening on :{PORT}', flush=True)
        server.serve_forever()
---
# Prerequisite: create the location Secret out-of-band before deploying.
# Coordinates are sensitive and must not be committed.
#
#   kubectl create secret generic weather-exporter-location -n lifestyle \
#     --from-literal=latitude=<lat> --from-literal=longitude=<lon>
#
apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-exporter
  namespace: lifestyle
spec:
  replicas: 1
  selector:
    matchLabels:
      app: weather-exporter
  template:
    metadata:
      labels:
        app: weather-exporter
    spec:
      containers:
        - name: weather-exporter
          image: python:3.14-slim@sha256:44dd04494ee8f3b538294360e7c4b3acb87c8268e4d0a4828a6500b1eff50061
          command: [python3, /scripts/weather-exporter.py]
          ports:
            - name: metrics
              containerPort: 9096
          env:
            - name: WEATHER_LATITUDE
              valueFrom:
                secretKeyRef:
                  name: weather-exporter-location
                  key: latitude
            - name: WEATHER_LONGITUDE
              valueFrom:
                secretKeyRef:
                  name: weather-exporter-location
                  key: longitude
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: scripts
              mountPath: /scripts
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              memory: 32Mi
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: scripts
          configMap:
            name: weather-exporter
            defaultMode: 0755
      priorityClassName: cluster-low
      nodeSelector:
        kubernetes.io/hostname: pi.home.arpa
---
apiVersion: v1
kind: Service
metadata:
  name: weather-exporter
  namespace: lifestyle
  labels:
    app: weather-exporter
spec:
  selector:
    app: weather-exporter
  ports:
    - name: metrics
      port: 9096
      targetPort: metrics
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: weather-exporter
  namespace: lifestyle
  labels:
    prometheus: lifestyle
spec:
  namespaceSelector:
    matchNames:
      - lifestyle
  selector:
    matchLabels:
      app: weather-exporter
  endpoints:
    - port: metrics
      path: /metrics
      interval: 5m
      scrapeTimeout: 15s
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: weather-exporter
  namespace: lifestyle
  labels:
    prometheus: lifestyle
spec:
  groups:
    - name: weather
      rules:
        - alert: WeatherExporterDown
          expr: weather_up == 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Outdoor weather exporter cannot reach Open-Meteo"
            description: "weather-exporter has failed to fetch from Open-Meteo for 15 minutes. Check pod logs and network connectivity."
