apiVersion: apps/v1
kind: Deployment
metadata:
  name: awair-exporter
  namespace: lifestyle
spec:
  replicas: 1
  selector:
    matchLabels:
      app: awair-exporter
  template:
    metadata:
      labels:
        app: awair-exporter
    spec:
      containers:
        - name: awair-exporter
          image: ghcr.io/fluv/awair-exporter:1.0.0@sha256:0cdc81a5a94d034f496569e02785387cf495c24d69f5393a378feb55d6d275ec
          ports:
            - name: metrics
              containerPort: 9092
          env:
            - name: AWAIR_SUBNET_PREFIX
              value: "192.168.1."
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 15
            periodSeconds: 30
      priorityClassName: cluster-low
      nodeSelector:
        kubernetes.io/hostname: pi.home.arpa
---
apiVersion: v1
kind: Service
metadata:
  name: awair-exporter
  namespace: lifestyle
  labels:
    app: awair-exporter
spec:
  selector:
    app: awair-exporter
  ports:
    - name: metrics
      port: 9092
      targetPort: metrics
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: awair-exporter
  namespace: lifestyle
  labels:
    prometheus: lifestyle
spec:
  namespaceSelector:
    matchNames:
      - lifestyle
  selector:
    matchLabels:
      app: awair-exporter
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: awair-exporter
  namespace: lifestyle
  labels:
    prometheus: lifestyle
spec:
  groups:
    - name: awair
      rules:
        - alert: AwairNoDevicesFound
          expr: sum(awair_up) == 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Awair exporter cannot reach any devices"
            description: "All Awair devices have been unreachable for 15 minutes. Check that the pod is running on pi.home.arpa and that devices are on the 192.168.1.0/24 subnet."
        - alert: AwairDeviceDown
          expr: awair_up == 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Awair device {{ $labels.location }} is unreachable"
            description: "Awair device '{{ $labels.location }}' ({{ $labels.device_uuid }}) has not responded for 15 minutes."
