# Image pinned to digest in #242. Update digest when upgrading Python.
apiVersion: v1
kind: ConfigMap
metadata:
  name: awair-exporter
  namespace: lifestyle
data:
  awair-exporter.py: |
    #!/usr/bin/env python3
    """Prometheus exporter for Awair Element air quality monitors.

    Discovers devices by device_uuid (stable across DHCP changes) via a
    parallel subnet scan at startup and every REDISCOVER_INTERVAL seconds.
    Polls /air-data/latest every POLL_INTERVAL seconds and serves metrics on
    :9092.
    """
    import json
    import math
    import os
    import sys
    import time
    import urllib.request
    from concurrent.futures import ThreadPoolExecutor, as_completed
    from http.server import BaseHTTPRequestHandler, HTTPServer
    from threading import Lock, Thread

    PORT = int(os.environ.get('AWAIR_EXPORTER_PORT', '9092').rsplit(':', 1)[-1])
    POLL_INTERVAL = 30
    REDISCOVER_INTERVAL = 600
    SUBNET_PREFIX = os.environ.get('AWAIR_SUBNET_PREFIX', '192.168.1.')
    SCAN_WORKERS = 50
    SCAN_TIMEOUT = 1.5

    # Maps device_uuid (stable) -> location label
    DEVICE_LOCATIONS = {
        'awair-element_34117': 'study',
        'awair-element_57196': 'lounge',
        'awair-element_15279': 'bedroom',
    }

    # Maps API field -> (metric_name, help_text)
    METRIC_MAP = {
        'score':            ('awair_score',             'Awair Score (0-100)'),
        'temp':             ('awair_temperature_celsius', 'Dry bulb temperature (C)'),
        'humid':            ('awair_humidity_percent',  'Relative Humidity (%)'),
        'abs_humid':        ('awair_abs_humidity_gm3',  'Absolute Humidity (g/m3)'),
        'dew_point':        ('awair_dew_point_celsius', 'Dew point temperature (C)'),
        'co2':              ('awair_co2_ppm',           'CO2 (ppm)'),
        'co2_est':          ('awair_co2_est_ppm',       'Estimated CO2 from TVOC sensor (ppm)'),
        'co2_est_baseline': ('awair_co2_est_baseline',  'TVOC sensor CO2 baseline (unitless)'),
        'voc':              ('awair_voc_ppb',           'Total Volatile Organic Compounds (ppb)'),
        'voc_baseline':     ('awair_voc_baseline',      'TVOC sensor VOC baseline (unitless)'),
        'voc_h2_raw':       ('awair_voc_h2_raw',        'TVOC sensor H2 signal (unitless)'),
        'voc_ethanol_raw':  ('awair_voc_ethanol_raw',   'TVOC sensor ethanol signal (unitless)'),
        'pm25':             ('awair_pm25_ugm3',         'PM2.5 particulate matter (ug/m3)'),
        'pm10_est':         ('awair_pm10_est_ugm3',     'Estimated PM10 particulate matter (ug/m3)'),
    }

    _lock = Lock()
    # device_uuid -> {'ip': str, 'location': str}
    _device_map: dict = {}
    # device_uuid -> (fetched_at: float, readings: dict | None)
    _readings: dict = {}


    def probe_config(ip: str):
        """Return (device_uuid, wifi_mac) if ip is an Awair, else None."""
        url = f'http://{ip}/settings/config/data'
        try:
            with urllib.request.urlopen(url, timeout=SCAN_TIMEOUT) as resp:
                data = json.loads(resp.read())
            uuid = data.get('device_uuid')
            mac = data.get('wifi_mac', '')
            if uuid:
                return uuid, mac
        except Exception:
            pass
        return None


    def discover():
        """Scan subnet, return {device_uuid: ip} for known devices."""
        ips = [f'{SUBNET_PREFIX}{i}' for i in range(1, 255)]
        found = {}

        def check(ip):
            result = probe_config(ip)
            if result:
                uuid, _ = result
                if uuid in DEVICE_LOCATIONS:
                    return uuid, ip
            return None

        with ThreadPoolExecutor(max_workers=SCAN_WORKERS) as pool:
            for future in as_completed({pool.submit(check, ip): ip for ip in ips}):
                r = future.result()
                if r:
                    uuid, ip = r
                    found[uuid] = ip

        return found


    def discover_loop():
        while True:
            print('awair-exporter: scanning subnet for devices...', file=sys.stderr, flush=True)
            found = discover()
            new_map = {}
            for uuid, location in DEVICE_LOCATIONS.items():
                ip = found.get(uuid)
                if ip:
                    new_map[uuid] = {'ip': ip, 'location': location}
                    print(f'awair-exporter: {uuid} ({location}) -> {ip}', file=sys.stderr, flush=True)
                else:
                    print(f'awair-exporter: {uuid} ({location}) not found on subnet', file=sys.stderr, flush=True)
            with _lock:
                _device_map.clear()
                _device_map.update(new_map)
            time.sleep(REDISCOVER_INTERVAL)


    def poll_device(uuid, ip):
        url = f'http://{ip}/air-data/latest'
        try:
            with urllib.request.urlopen(url, timeout=5) as resp:
                data = json.loads(resp.read())
            with _lock:
                _readings[uuid] = (time.time(), data)
        except Exception as e:
            print(f'awair-exporter: poll {uuid} ({ip}): {e}', file=sys.stderr, flush=True)
            with _lock:
                _readings[uuid] = (time.time(), None)


    def poll_loop():
        while True:
            with _lock:
                targets = {uuid: info['ip'] for uuid, info in _device_map.items()}
            for uuid, ip in targets.items():
                poll_device(uuid, ip)
            time.sleep(POLL_INTERVAL)


    def render_metrics():
        with _lock:
            readings_snap = dict(_readings)

        lines = []
        now = time.time()

        lines.append('# HELP awair_up 1 if device responded to the last poll, 0 otherwise')
        lines.append('# TYPE awair_up gauge')
        for uuid, location in DEVICE_LOCATIONS.items():
            fetched_at, data = readings_snap.get(uuid, (None, None))
            stale = fetched_at is None or (now - fetched_at) > POLL_INTERVAL * 3
            up = 0 if (data is None or stale) else 1
            lbl = f'location="{location}",device_uuid="{uuid}"'
            lines.append(f'awair_up{{{lbl}}} {up}')

        for api_key, (metric_name, help_text) in METRIC_MAP.items():
            lines.append(f'# HELP {metric_name} {help_text}')
            lines.append(f'# TYPE {metric_name} gauge')
            for uuid, location in DEVICE_LOCATIONS.items():
                _, data = readings_snap.get(uuid, (None, None))
                if data is None:
                    continue
                val = data.get(api_key)
                if val is None or not isinstance(val, (int, float)) or not math.isfinite(val):
                    continue
                lbl = f'location="{location}",device_uuid="{uuid}"'
                lines.append(f'{metric_name}{{{lbl}}} {val}')

        lines.append('')
        return '\n'.join(lines)


    class Handler(BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path not in ('/', '/metrics'):
                self.send_response(404)
                self.end_headers()
                return
            try:
                body = render_metrics().encode()
                self.send_response(200)
                self.send_header('Content-Type', 'text/plain; version=0.0.4; charset=utf-8')
                self.send_header('Content-Length', str(len(body)))
                self.end_headers()
                self.wfile.write(body)
            except Exception as e:
                self.send_response(500)
                self.end_headers()
                self.wfile.write(str(e).encode())

        def log_message(self, fmt, *args):
            pass

    if __name__ == '__main__':
        Thread(target=discover_loop, daemon=True).start()
        time.sleep(2)  # first discovery pass before poll loop starts
        Thread(target=poll_loop, daemon=True).start()
        server = HTTPServer(('', PORT), Handler)
        print(f'awair-exporter listening on :{PORT}', flush=True)
        server.serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: awair-exporter
  namespace: lifestyle
spec:
  replicas: 1
  selector:
    matchLabels:
      app: awair-exporter
  template:
    metadata:
      labels:
        app: awair-exporter
    spec:
      containers:
        - name: awair-exporter
          image: python:3.14-slim@sha256:7a500125bc50693f2214e842a621440a1b1b9cbb2188f74ab045d29ed2ea5856
          command: [python3, /scripts/awair-exporter.py]
          ports:
            - name: metrics
              containerPort: 9092
          env:
            - name: AWAIR_SUBNET_PREFIX
              value: "192.168.1."
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: scripts
              mountPath: /scripts
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 15
            periodSeconds: 30
      volumes:
        - name: scripts
          configMap:
            name: awair-exporter
            defaultMode: 0755
      priorityClassName: cluster-low
      nodeSelector:
        kubernetes.io/hostname: pi.home.arpa
---
apiVersion: v1
kind: Service
metadata:
  name: awair-exporter
  namespace: lifestyle
  labels:
    app: awair-exporter
spec:
  selector:
    app: awair-exporter
  ports:
    - name: metrics
      port: 9092
      targetPort: metrics
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: awair-exporter
  namespace: lifestyle
  labels:
    prometheus: lifestyle
spec:
  namespaceSelector:
    matchNames:
      - lifestyle
  selector:
    matchLabels:
      app: awair-exporter
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: awair-exporter
  namespace: lifestyle
  labels:
    prometheus: lifestyle
spec:
  groups:
    - name: awair
      rules:
        - alert: AwairNoDevicesFound
          expr: sum(awair_up) == 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Awair exporter cannot reach any devices"
            description: "All Awair devices have been unreachable for 15 minutes. Check that the pod is running on pi.home.arpa and that devices are on the 192.168.1.0/24 subnet."
        - alert: AwairDeviceDown
          expr: awair_up == 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Awair device {{ $labels.location }} is unreachable"
            description: "Awair device '{{ $labels.location }}' ({{ $labels.device_uuid }}) has not responded for 15 minutes."
