apiVersion: apps/v1
kind: Deployment
metadata:
  name: botsnack
  namespace: telegram-trading
spec:
  replicas: 1
  selector:
    matchLabels:
      app: botsnack
  template:
    metadata:
      labels:
        app: botsnack
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: botsnack
          image: ghcr.io/fluv/botsnack:0.5.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: opinions
              mountPath: /app/opinions.json
              subPath: opinions.json
              readOnly: true
      volumes:
        - name: opinions
          secret:
            secretName: botsnack-opinions
            optional: true
