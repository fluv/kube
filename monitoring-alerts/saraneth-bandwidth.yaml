apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: saraneth-bandwidth
  namespace: monitoring
  labels:
    release: prometheus
spec:
  groups:
    - name: saraneth-bandwidth
      rules:
        - alert: SaranethBandwidthWarning
          expr: |
            increase(node_network_transmit_bytes_total{instance=~"saraneth.*",device!~"lo|tailscale0|veth.*|cali.*|tunl.*"}[7d])
            / 1e12 > 0.37
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "Saraneth WAN egress approaching monthly cap"
            description: >-
              Saraneth has transmitted {{ $value | humanize }}TB in the last 7 days
              (~1.6 TB/month extrapolated). Bitfolk allowance is 2 TB/month.
              Check Longhorn replica placement — hot volumes should not have replicas on saraneth.

        - alert: SaranethBandwidthCritical
          expr: |
            increase(node_network_transmit_bytes_total{instance=~"saraneth.*",device!~"lo|tailscale0|veth.*|cali.*|tunl.*"}[7d])
            / 1e12 > 0.47
          for: 15m
          labels:
            severity: critical
          annotations:
            summary: "Saraneth WAN egress on track to exceed monthly cap"
            description: >-
              Saraneth has transmitted {{ $value | humanize }}TB in the last 7 days
              (~2 TB/month extrapolated), on track to exceed the Bitfolk 2 TB allowance.
              Immediate action required: check Longhorn replica placement and consider
              stopping k3s on saraneth to halt replication.

        - alert: SaranethBandwidthRateHigh
          expr: |
            rate(node_network_transmit_bytes_total{instance=~"saraneth.*",device!~"lo|tailscale0|veth.*|cali.*|tunl.*"}[1h])
            * 86400 * 30 / 1e12 > 1.0
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "Saraneth WAN egress rate would exceed 1 TB/mo"
            description: >-
              Saraneth's current egress rate of {{ $value | humanize }}B/s would consume
              {{ with query "rate(node_network_transmit_bytes_total{instance=~\"saraneth.*\",device!~\"lo|tailscale0|veth.*|cali.*|tunl.*\"}[1h]) * 86400 * 30 / 1e12" }}{{ . | first | value | humanize }}{{ end }}TB
              over 30 days. Investigate Longhorn replication traffic.
