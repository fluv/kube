apiVersion: apps/v1
kind: Deployment
metadata:
  name: mariadb
  namespace: wiki-gsi
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mariadb
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mariadb
    spec:
      nodeSelector:
        kubernetes.io/hostname: pi.home.arpa
      initContainers:
        # One-shot re-seed of the DB data directory from the pristine 10.3
        # source on the Pi host. A prior 10.11 image (renovate #515) began an
        # InnoDB redo-log upgrade against the restored single-server data dir,
        # which has no root@localhost for the upgrade step, leaving the volume
        # half-migrated. Wiping and recopying from source restores a known-good
        # 10.3 directory that this 10.6 image can open. Sentinel-guarded so it
        # runs exactly once: subsequent pod starts skip it.
        #
        # Runs as uid 999 (same as mariadbd), not root: the host source is made
        # world-readable so it can be read without root, and the copy creates
        # files already owned by 999, so no chown is needed. The PVC's existing
        # contents are 999-owned from prior runs, so the wipe needs no root
        # either (a root-owned lost+found, if present, is left in place and
        # ignored by mariadbd).
        - name: reseed
          image: alpine:3.23
          command:
            - sh
            - -c
            - |
              if [ -f /data/.reseeded-from-source-v2 ]; then
                echo "Already reseeded, skipping"
                exit 0
              fi
              echo "Wiping half-upgraded data and recopying pristine source..."
              rm -rf /data/* /data/..?* /data/.[!.]* 2>/dev/null || true
              cp -r /source/. /data/
              chmod -R go-w,o-rx /data
              touch /data/.reseeded-from-source-v2
              echo "Reseed complete"
          volumeMounts:
            - name: db-source
              mountPath: /source
              readOnly: true
            - name: db-data
              mountPath: /data
          securityContext:
            runAsUser: 999
            runAsGroup: 999
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
      containers:
        - name: mariadb
          image: mariadb:10.11
          args:
            - --init-file=/etc/mysql/init.sql
          ports:
            - containerPort: 3306
          env:
            - name: MARIADB_AUTO_UPGRADE
              value: "1"
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/mysql
            - name: db-init
              mountPath: /etc/mysql/init.sql
              subPath: db-init.sql
          # First boot on a new image runs mariadb-upgrade (here 10.6 -> 10.11,
          # part of the staged 10.6 -> 10.11 -> 11.4 path in issue #521). The
          # entrypoint serves that on a temporary socket with the TCP port
          # closed, so 3306 refuses connections until the upgrade finishes and
          # the real server binds. A startupProbe holds liveness/readiness off
          # until then (30 x 10s = up to 5 min) so the upgrade is never killed
          # mid-flight.
          startupProbe:
            tcpSocket:
              port: 3306
            periodSeconds: 10
            failureThreshold: 30
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              memory: 512Mi
          securityContext:
            runAsUser: 999
            runAsGroup: 999
      volumes:
        - name: db-source
          hostPath:
            path: /home/claude/mw/mysql/mysql
            type: Directory
        - name: db-data
          persistentVolumeClaim:
            claimName: wiki-gsi-db
        - name: db-init
          configMap:
            name: wiki-gsi-settings
            items:
              - key: db-init.sql
                path: db-init.sql
---
apiVersion: v1
kind: Service
metadata:
  name: mariadb
  namespace: wiki-gsi
spec:
  type: ClusterIP
  selector:
    app: mariadb
  ports:
    - port: 3306
      targetPort: 3306
