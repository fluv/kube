apiVersion: apps/v1
kind: Deployment
metadata:
  name: mariadb
  namespace: wiki-gsi
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mariadb
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mariadb
    spec:
      nodeSelector:
        kubernetes.io/hostname: pi.home.arpa
      initContainers:
        # One-shot re-seed of the DB data directory from the validated source
        # on the Pi host. The restored single-server dump had no root@localhost
        # (only root@<original-host>, password-protected), so the MariaDB Docker
        # entrypoint -- which connects to root@localhost passwordless to run its
        # in-place upgrade -- was denied and crashlooped on the 10.6 -> 10.11
        # bump. The source at /home/claude/mw-test/data is that dump already
        # upgraded to 10.11 and given a passwordless root@localhost, validated
        # offline in a throwaway pod; reseeding from it lands a known-good 10.11
        # volume with no in-cluster upgrade needed. The pristine 10.3 dump
        # remains at /home/claude/mw/mysql/mysql as a backup. Sentinel-guarded
        # so it runs exactly once: subsequent pod starts skip it.
        #
        # Runs as uid 999 (same as mariadbd), not root: source files are 999-
        # owned (written by the prep pod) or world-readable, so they read
        # without root, and the copy creates files already owned by 999. The
        # PVC's existing contents are 999-owned from prior runs, so the wipe
        # needs no root (a root-owned lost+found, if present, is left in place
        # and ignored by mariadbd).
        - name: reseed
          image: alpine:3.23
          command:
            - sh
            - -c
            - |
              if [ -f /data/.reseeded-from-source-v3 ]; then
                echo "Already reseeded, skipping"
                exit 0
              fi
              echo "Wiping PVC and copying validated 10.11 source..."
              rm -rf /data/* /data/..?* /data/.[!.]* 2>/dev/null || true
              cp -r /source/. /data/
              chmod -R go-w,o-rx /data
              touch /data/.reseeded-from-source-v3
              echo "Reseed complete"
          volumeMounts:
            - name: db-source
              mountPath: /source
              readOnly: true
            - name: db-data
              mountPath: /data
          securityContext:
            runAsUser: 999
            runAsGroup: 999
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
      containers:
        - name: mariadb
          image: mariadb:10.11
          args:
            - --init-file=/etc/mysql/init.sql
          ports:
            - containerPort: 3306
          env:
            - name: MARIADB_AUTO_UPGRADE
              value: "1"
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/mysql
            - name: db-init
              mountPath: /etc/mysql/init.sql
              subPath: db-init.sql
          # The reseed source is already at this image's version (10.11), so
          # MARIADB_AUTO_UPGRADE is a no-op on a clean boot and 3306 comes up
          # promptly. The startupProbe is kept as a safety margin: should a
          # future image bump (e.g. 11.4) land here before the source is
          # re-prepared, the entrypoint would run mariadb-upgrade on a temporary
          # socket with the TCP port closed, and the probe (30 x 10s = up to
          # 5 min) holds liveness/readiness off so it is never killed mid-flight.
          startupProbe:
            tcpSocket:
              port: 3306
            periodSeconds: 10
            failureThreshold: 30
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              memory: 512Mi
          securityContext:
            runAsUser: 999
            runAsGroup: 999
      volumes:
        - name: db-source
          hostPath:
            path: /home/claude/mw-test/data
            type: Directory
        - name: db-data
          persistentVolumeClaim:
            claimName: wiki-gsi-db
        - name: db-init
          configMap:
            name: wiki-gsi-settings
            items:
              - key: db-init.sql
                path: db-init.sql
---
apiVersion: v1
kind: Service
metadata:
  name: mariadb
  namespace: wiki-gsi
spec:
  type: ClusterIP
  selector:
    app: mariadb
  ports:
    - port: 3306
      targetPort: 3306
