apiVersion: apps/v1
kind: Deployment
metadata:
  name: mariadb
  namespace: wiki-gsi
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mariadb
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mariadb
      annotations:
        # db-init.sql is mounted via subPath, which does not receive ConfigMap
        # updates on a running pod. Bump when db-init.sql changes so the pod
        # rolls and re-reads it. Incremented when FLUSH PRIVILEGES was removed.
        wiki-gsi.fluv/db-init-revision: "2"
    spec:
      containers:
        - name: mariadb
          image: mariadb:11.4
          args:
            - --init-file=/etc/mysql/init.sql
          ports:
            - containerPort: 3306
          env:
            - name: MARIADB_AUTO_UPGRADE
              value: "1"
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/mysql
            - name: db-init
              mountPath: /etc/mysql/init.sql
              subPath: db-init.sql
          # MARIADB_AUTO_UPGRADE=1: the entrypoint runs mariadb-upgrade on a
          # temporary socket with the TCP port closed; the startupProbe
          # (30 x 10s = up to 5 min) holds liveness/readiness off so it is
          # never killed mid-flight. NOTE: the entrypoint's own readiness loop
          # is ~30s; on the Pi's slow storage 10.11 -> 11.8 exceeded it, which
          # is why 11.4 (which fit) is the target.
          startupProbe:
            tcpSocket:
              port: 3306
            periodSeconds: 10
            failureThreshold: 30
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              memory: 512Mi
          securityContext:
            runAsUser: 999
            runAsGroup: 999
      volumes:
        - name: db-data
          persistentVolumeClaim:
            claimName: wiki-gsi-db
        - name: db-init
          configMap:
            name: wiki-gsi-settings
            items:
              - key: db-init.sql
                path: db-init.sql
---
apiVersion: v1
kind: Service
metadata:
  name: mariadb
  namespace: wiki-gsi
spec:
  type: ClusterIP
  selector:
    app: mariadb
  ports:
    - port: 3306
      targetPort: 3306
