apiVersion: apps/v1
kind: Deployment
metadata:
  name: mediawiki
  namespace: wiki-gsi
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mediawiki
  template:
    metadata:
      labels:
        app: mediawiki
      annotations:
        # Bump in lockstep with the MariaDB reseed sentinel in mariadb.yaml.
        # A reseed restores the raw dump schema (no actor-migration columns,
        # etc.), so MediaWiki must re-run update.php -- its update-schema init
        # container -- against the fresh DB or every content query fails with
        # "Unknown column 'rev_actor'". Changing this value rolls the
        # deployment, which re-runs that init container.
        wiki-gsi.fluv/db-seed: "v3"
    spec:
      securityContext:
        fsGroup: 33
        runAsUser: 33
        runAsGroup: 33
        runAsNonRoot: true
      initContainers:
        # The <DynamicPageList> (Intersection) extension the farm's pages use is
        # not bundled in the stock image. Clone its REL1_43 branch into a shared
        # volume. Non-fatal on purpose: if the fetch fails the pod still starts
        # (LocalSettings only loads the extension when the dir is present), so a
        # GitHub hiccup can never take the wiki down. A custom image is the
        # better long-term home for this plus the rest of the farm extensions.
        - name: fetch-dpl
          image: alpine/git:latest
          command:
            - sh
            - -c
            - >-
              git clone --depth 1 -b REL1_43
              https://github.com/wikimedia/mediawiki-extensions-intersection /ext
              || echo "DPL fetch failed; wiki will start without it"
          volumeMounts:
            - name: dpl-ext
              mountPath: /ext
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits: { memory: 128Mi }
        - name: update-schema
          image: mediawiki:1.43
          command:
            - php
            - maintenance/run.php
            - update
            - --quick
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 256Mi
          env:
            - name: MEDIAWIKI_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wiki-gsi-secret
                  key: db-password
            - name: MEDIAWIKI_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: wiki-gsi-secret
                  key: secret-key
            - name: MEDIAWIKI_UPGRADE_KEY
              valueFrom:
                secretKeyRef:
                  name: wiki-gsi-secret
                  key: upgrade-key
          volumeMounts:
            - name: local-settings
              mountPath: /var/www/html/LocalSettings.php
              subPath: LocalSettings.php
            - name: images
              mountPath: /var/www/html/images
            - name: apache-ports
              mountPath: /etc/apache2/ports.conf
              subPath: apache-ports.conf
            - name: dpl-ext
              mountPath: /var/www/html/extensions/DynamicPageList
      containers:
        - name: mediawiki
          image: mediawiki:1.43
          ports:
            - containerPort: 8080
          env:
            - name: MEDIAWIKI_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wiki-gsi-secret
                  key: db-password
            - name: MEDIAWIKI_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: wiki-gsi-secret
                  key: secret-key
            - name: MEDIAWIKI_UPGRADE_KEY
              valueFrom:
                secretKeyRef:
                  name: wiki-gsi-secret
                  key: upgrade-key
          volumeMounts:
            - name: local-settings
              mountPath: /var/www/html/LocalSettings.php
              subPath: LocalSettings.php
            - name: images
              mountPath: /var/www/html/images
            - name: apache-ports
              mountPath: /etc/apache2/ports.conf
              subPath: apache-ports.conf
            - name: dpl-ext
              mountPath: /var/www/html/extensions/DynamicPageList
          livenessProbe:
            httpGet:
              path: /wiki/Main_Page
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /wiki/Main_Page
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
      volumes:
        - name: local-settings
          configMap:
            name: wiki-gsi-settings
        - name: images
          persistentVolumeClaim:
            claimName: wiki-gsi-images
        - name: apache-ports
          configMap:
            name: wiki-gsi-settings
            items:
              - key: apache-ports.conf
                path: apache-ports.conf
        - name: dpl-ext
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mediawiki
  namespace: wiki-gsi
spec:
  type: ClusterIP
  selector:
    app: mediawiki
  ports:
    - port: 80
      targetPort: 8080
