apiVersion: v1
kind: ConfigMap
metadata:
  name: wiki-gsi-settings
  namespace: wiki-gsi
data:
  LocalSettings.php: |
    <?php
    if ( !defined( 'MEDIAWIKI' ) ) {
      exit;
    }

    $wgSitename = "GSI";
    $wgMetaNamespace = "Project";
    $wgScriptPath = "";
    $wgArticlePath = "/wiki/$1";
    $wgServer = "https://gsi.gentoo-mine.ts.net";
    $wgStylePath = "$wgScriptPath/skins";
    $wgResourceBasePath = $wgScriptPath;

    // Database
    $wgDBtype = "mysql";
    $wgDBserver = "mariadb";
    $wgDBname = "mediawiki";
    $wgDBuser = "mediawiki";
    $wgDBpassword = getenv( 'MEDIAWIKI_DB_PASSWORD' );
    $wgDBprefix = "gsi_";
    $wgDBTableOptions = "ENGINE=InnoDB, DEFAULT CHARSET=binary";

    // Cache — no memcached in k8s, APCu if available
    $wgMainCacheType = CACHE_ACCEL;
    $wgMemCachedServers = [];

    // Uploads
    $wgEnableUploads = true;
    $wgUploadDirectory = "$IP/images";
    $wgFileExtensions = [ 'png', 'gif', 'jpg', 'jpeg', 'webp', 'svg' ];
    $wgUseImageMagick = false;

    // Pull media from Wikimedia Commons (foreign file repo). The 1.39 series
    // carries the fix (from 1.39.14) for Wikimedia's User-Agent policy, so
    // InstantCommons' requests are not throttled; the running image was
    // checked to satisfy this before enabling.
    $wgUseInstantCommons = true;

    // Language
    $wgLanguageCode = "sco";

    // Credentials — injected from Secret, not stored in git
    $wgSecretKey = getenv( 'MEDIAWIKI_SECRET_KEY' );
    $wgUpgradeKey = getenv( 'MEDIAWIKI_UPGRADE_KEY' );

    // Private wiki
    $wgGroupPermissions['*']['edit'] = false;
    $wgGroupPermissions['*']['read'] = false;
    $wgGroupPermissions['*']['createaccount'] = false;
    $wgGroupPermissions['user']['read'] = true;
    $wgGroupPermissions['user']['edit'] = true;
    $wgGroupPermissions['sysop']['edit'] = true;

    // Custom groups from original wiki
    $wgGroupPermissions['deceased']['read'] = true;
    $wgGroupPermissions['observer']['read'] = true;
    $wgGroupPermissions['observer']['edit'] = true;
    $wgGroupPermissions['clergy']['autoconfirmed'] = true;
    $wgRemoveGroups['clergy'] = [ 'deceased' ];
    $wgAddGroups['clergy'] = [ 'clergy', 'deceased' ];

    $wgRestrictDisplayTitle = false;
    $wgNamespacesWithSubpages[NS_MAIN] = true;
    $wgWhitelistRead = [ 'Reading list', 'Comics' ];

    // Skin
    $wgDefaultSkin = "vector";
    wfLoadSkin( 'Vector' );
    wfLoadSkin( 'MonoBook' );

    // Extensions (all bundled with mediawiki:1.39)
    wfLoadExtension( 'ParserFunctions' );
    wfLoadExtension( 'Cite' );
    wfLoadExtension( 'SyntaxHighlight_GeSHi' );
    wfLoadExtension( 'Scribunto' );
    $wgScribuntoDefaultEngine = 'luastandalone';

    $wgDiff3 = "/usr/bin/diff3";

    // Logo: the restored Wiki.png lives under the images upload dir
    // (/images/b/bc/Wiki.png, copied into the images PVC). $wgLogo was renamed
    // to $wgLogos (1x/1.5x/2x/icon/wordmark) in MediaWiki 1.35.
    $wgLogos = [ '1x' => "$wgScriptPath/images/b/bc/Wiki.png" ];

    // <DynamicPageList> (Intersection). Fetched into extensions/DynamicPageList
    // by the fetch-dpl init container; load only if its extension.json is
    // actually present (the dir is an always-mounted emptyDir, so check the
    // file) so a failed or partial fetch never fatals the wiki.
    if ( file_exists( "$IP/extensions/DynamicPageList/extension.json" ) ) {
        wfLoadExtension( 'DynamicPageList' );
    }
  db-init.sql: |
    -- Allow the mediawiki user to connect from pod IPs, not just localhost.
    -- The restored DB came from a single-server install where the user was
    -- bound to localhost. mysql.user has been a VIEW over mysql.global_priv
    -- since MariaDB 10.4, so the host must be rewritten on the real grant
    -- tables, not the view. Idempotent: re-runs match 0 rows once migrated,
    -- so no statement errors on subsequent startups.
    UPDATE mysql.global_priv  SET Host='%' WHERE User='mediawiki' AND Host='localhost';
    UPDATE mysql.db           SET Host='%' WHERE User='mediawiki' AND Host='localhost';
    UPDATE mysql.tables_priv  SET Host='%' WHERE User='mediawiki' AND Host='localhost';
    UPDATE mysql.columns_priv SET Host='%' WHERE User='mediawiki' AND Host='localhost';
    UPDATE mysql.procs_priv   SET Host='%' WHERE User='mediawiki' AND Host='localhost';
    -- Deliberately NO `FLUSH PRIVILEGES` here. This file runs via --init-file on
    -- EVERY server start, including the MariaDB entrypoint's upgrade temp server,
    -- which is launched with --skip-grant-tables. A FLUSH there reloads the grant
    -- tables and cancels skip-grant-tables mid-upgrade, after which the
    -- entrypoint's own pre-upgrade backup / mariadb-upgrade (which connect as the
    -- unauthenticated OS user mysql@localhost) are denied and the upgrade aborts
    -- (broke the 10.11 -> 11.4 bump). The UPDATEs above are plain DML and persist
    -- to disk regardless; the real (final) server loads them on its normal start.
  apache-ports.conf: |
    Listen 8080
    <IfModule ssl_module>
        Listen 8443
    </IfModule>
    <IfModule mod_gnutls.c>
        Listen 8443
    </IfModule>
