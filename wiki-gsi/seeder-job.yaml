# One-shot job to copy the raw MariaDB data directory and wiki images from the
# Pi host into their respective Longhorn PVCs. Re-running is safe: both steps
# check for existing data before copying.
#
# After this job completes, delete it (or leave it — it won't re-run since
# completions: 1 and restartPolicy: Never).
apiVersion: batch/v1
kind: Job
metadata:
  name: wiki-gsi-seed
  namespace: wiki-gsi
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      nodeSelector:
        kubernetes.io/hostname: pi.home.arpa
      initContainers:
        - name: seed-db
          image: alpine:3.23
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          command:
            - sh
            - -c
            - |
              if [ -f /mariadb-data/ibdata1 ]; then
                echo "DB data already present, skipping"
                exit 0
              fi
              echo "Seeding MariaDB data directory..."
              cp -a /source-db/. /mariadb-data/
              chown -R 999:999 /mariadb-data/
              echo "DB seed complete"
          volumeMounts:
            - name: source-db
              mountPath: /source-db
              readOnly: true
            - name: db-data
              mountPath: /mariadb-data
          securityContext:
            runAsUser: 0
      containers:
        - name: seed-images
          image: alpine:3.23
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          command:
            - sh
            - -c
            - |
              if [ "$(ls -A /images-data/)" ]; then
                echo "Images already present, skipping"
                exit 0
              fi
              echo "Seeding images directory..."
              cp -a /source-images/. /images-data/
              chown -R 33:33 /images-data/
              echo "Images seed complete"
          volumeMounts:
            - name: source-images
              mountPath: /source-images
              readOnly: true
            - name: images-data
              mountPath: /images-data
          securityContext:
            runAsUser: 0
      volumes:
        - name: source-db
          hostPath:
            path: /home/claude/mw/mysql/mysql
            type: Directory
        - name: source-images
          hostPath:
            path: /home/claude/mw/wikis/wikis/w/images/images
            type: Directory
        - name: db-data
          persistentVolumeClaim:
            claimName: wiki-gsi-db
        - name: images-data
          persistentVolumeClaim:
            claimName: wiki-gsi-images
