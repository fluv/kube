apiVersion: apps/v1
kind: Deployment
metadata:
  name: barcodebuddy
  namespace: barcodebuddy
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: barcodebuddy
  template:
    metadata:
      labels:
        app: barcodebuddy
    spec:
      containers:
        - name: barcodebuddy
          image: ghcr.io/zuzak/barcodebuddy-docker:latest@sha256:4e5895062ac7aa1300ef31604257f812a0262a78b66b02f32ac34b7fdfdc2737
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          env:
            - name: TZ
              value: Europe/London
            - name: BBUDDY_DISABLE_AUTHENTICATION
              value: "true"
            - name: BBUDDY_EXTERNAL_GROCY_URL
              value: "https://grocy.gentoo-mine.ts.net/"
          volumeMounts:
            - name: config
              mountPath: /config
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 128Mi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: barcodebuddy-config
