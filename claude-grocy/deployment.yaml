apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-grocy
  namespace: claude-grocy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: claude-grocy
  template:
    metadata:
      labels:
        app: claude-grocy
    spec:
      containers:
        - name: claude-grocy
          image: ghcr.io/zuzak/mcp-grocy-api:latest
          imagePullPolicy: Always
          command: ["node", "build/index.js"]
          ports:
            - containerPort: 8080
          env:
            - name: GROCY_BASE_URL
              value: "http://grocy.grocy.svc.cluster.local"
            - name: GROCY_APIKEY_VALUE
              valueFrom:
                secretKeyRef:
                  name: grocy-api-key
                  key: GROCY_APIKEY_VALUE
            - name: ENABLE_HTTP_SERVER
              value: "true"
            - name: HTTP_SERVER_PORT
              value: "8080"
            - name: GROCY_ENABLE_SSL_VERIFY
              value: "false"
            - name: REST_RESPONSE_SIZE_LIMIT
              value: "10485760"
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
          resources:
            requests:
              cpu: 5m
              memory: 64Mi
            limits:
              memory: 128Mi
