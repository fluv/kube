apiVersion: v1
kind: ServiceAccount
metadata:
  name: claude-grocy-restarter
  namespace: claude-grocy
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: claude-grocy-restarter
  namespace: claude-grocy
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: claude-grocy-restarter
  namespace: claude-grocy
subjects:
  - kind: ServiceAccount
    name: claude-grocy-restarter
    namespace: claude-grocy
roleRef:
  kind: Role
  name: claude-grocy-restarter
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: claude-grocy-restart
  namespace: claude-grocy
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        spec:
          serviceAccountName: claude-grocy-restarter
          restartPolicy: OnFailure
          containers:
            - name: kubectl
              image: rancher/kubectl:v1.36.1
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  kubectl delete pods -l app=claude-grocy -n claude-grocy --grace-period=5 --ignore-not-found
                  kubectl rollout status deployment/claude-grocy -n claude-grocy --timeout=600s
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  memory: 64Mi
