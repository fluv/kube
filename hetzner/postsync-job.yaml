apiVersion: batch/v1
kind: Job
metadata:
  name: hcloud-init-data-update
  namespace: kube-system
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      serviceAccountName: hcloud-init-updater
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
        - name: kubectl-copy
          # Copy the kubectl binary into the shared volume so the python
          # container (which has no kubectl) can run it.
          # Pinned digest matches kube/longhorn-disk-tagger/daemonset.yaml.
          image: docker.io/bitnami/kubectl@sha256:cd9daa0cc6968665402654b887bdc59aba0f774d0d0a36808eb9259fb642aa5c
          command: [sh, -c, "cp $(which kubectl) /shared/kubectl"]
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: shared-bin
              mountPath: /shared
      containers:
        - name: update-secret
          # The script and cloud-init template arrive as a ConfigMap mounted at
          # /hook (generated by kustomize's configMapGenerator with a content-hash
          # name suffix). Editing either file changes the hash, which makes the
          # ConfigMap a new tracked resource — that diff is what triggers the
          # ArgoCD sync that fires this PostSync hook. See hetzner/kustomization.yaml.
          image: python:3.14-slim@sha256:63a4c7f612a00f92042cbdcc7cdc6a306f38485af0a200b9c89de7d9b1607d15
          command:
            - sh
            - -ec
            - |
              python3 /hook/update-cluster-config-secret.py
              kubectl rollout restart deployment -n kube-system hcloud-cluster-autoscaler-hetzner-cluster-autoscaler
          env:
            - name: PATH
              value: /shared:/usr/local/bin:/usr/bin:/bin
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: hook
              mountPath: /hook
            - name: shared-bin
              mountPath: /shared
      volumes:
        - name: hook
          configMap:
            # kustomize rewrites this to the hash-suffixed name (hcloud-init-<hash>).
            name: hcloud-init
        - name: shared-bin
          emptyDir: {}
