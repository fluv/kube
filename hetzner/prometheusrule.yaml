apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: hcloud-init-hook
  namespace: kube-system
  labels:
    release: prometheus
spec:
  groups:
    - name: hcloud-init-hook
      rules:
        - alert: HcloudInitDataUpdateFailed
          expr: |
            kube_job_status_failed{
              namespace="kube-system",
              job_name="hcloud-init-data-update"
            } > 0
          for: 5m
          labels:
            severity: warning
            component: hcloud-init-hook
          annotations:
            summary: "hcloud-init-data-update PostSync Job failed"
            description: "The hcloud-init-data-update Job has failed. The autoscaler cluster-config secret may be stale — new Hetzner nodes will be provisioned with the old template. Check the Job logs in kube-system."
    - name: hetzner-node-labels
      rules:
        - alert: HetznerNodeMissingDurableLabel
          expr: |
            kube_node_labels{label_instance_hetzner_cloud_provided_by="cloud"}
              unless on (node)
            kube_node_labels{label_storage_zuzak_uk_durable="true"}
          for: 5m
          labels:
            severity: warning
            component: hetzner-node-labels
          annotations:
            summary: "Hetzner node missing storage.zuzak.uk/durable label"
            description: "Node {{ $labels.node }} is provisioned by Hetzner but does not have storage.zuzak.uk/durable=true. The longhorn-disk-tagger will not run on it, so longhorn-durable volumes cannot get replicas there. Check cloud-init and apply the label manually if the node is already running."
