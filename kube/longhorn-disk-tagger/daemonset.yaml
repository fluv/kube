apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: longhorn-disk-tagger
  namespace: longhorn-system
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: longhorn-disk-tagger
  template:
    metadata:
      labels:
        app.kubernetes.io/name: longhorn-disk-tagger
    spec:
      serviceAccountName: longhorn-disk-tagger
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: storage.k3s.fluv.net/durable
                    operator: In
                    # Allowlist: only run on nodes explicitly labelled as having
                    # durable storage. Unlabelled nodes (Pi, saraneth, future SD-backed
                    # nodes) are excluded by default — fail-closed instead of fail-open.
                    # Apply with: kubectl label node <name> storage.k3s.fluv.net/durable=true
                    values: ["true"]
      containers:
        - name: tagger
          image: docker.io/bitnami/kubectl@sha256:a67b11e95e953f550f020a41970185ccc5f83d78b86b8c575d02c904aa0f9cd7
          command: [sh, -c]
          args:
            - |
              until kubectl get nodes.longhorn.io/"$NODE_NAME" -n longhorn-system >/dev/null 2>&1; do
                echo "waiting for longhorn node $NODE_NAME..."
                sleep 10
              done
              DISK_KEYS=$(kubectl get nodes.longhorn.io/"$NODE_NAME" -n longhorn-system \
                -o go-template='{{range $key, $_ := .spec.disks}}{{$key}} {{end}}')
              PATCH='{"spec":{"disks":{'
              FIRST=true
              for KEY in $DISK_KEYS; do
                [ "$FIRST" = "true" ] || PATCH="${PATCH},"
                PATCH="${PATCH}\"${KEY}\":{\"tags\":[\"durable\"]}"
                FIRST=false
              done
              PATCH="${PATCH}}}}"
              # check kubectl exit code so silent failures don't masquerade as success
              if ! kubectl patch nodes.longhorn.io/"$NODE_NAME" -n longhorn-system \
                --type=merge --patch "$PATCH"; then
                echo "patch failed; sleeping then exiting non-zero so the daemonset restarts us"
                sleep 30
                exit 1
              fi
              echo "tagged all disks on $NODE_NAME as durable"
              exec sleep infinity
          resources:
            requests:
              cpu: 1m
              memory: 20Mi
            limits:
              cpu: 50m
              memory: 64Mi
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
