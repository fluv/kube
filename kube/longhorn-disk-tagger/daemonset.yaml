apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: longhorn-disk-tagger
  namespace: longhorn-system
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: longhorn-disk-tagger
  template:
    metadata:
      labels:
        app.kubernetes.io/name: longhorn-disk-tagger
    spec:
      serviceAccountName: longhorn-disk-tagger
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  # Allowlist: only run on nodes whose storage is confirmed SSD-backed.
                  # Set at node join via --node-label in hetzner/cloud-init-template.yaml.
                  # Existing nodes must be labelled manually before this DaemonSet will
                  # schedule on them (see fluv/kube#249 for the kubectl label command).
                  - key: storage.zuzak.uk/disk-type
                    operator: In
                    values: [ssd]
      containers:
        - name: tagger
          image: docker.io/bitnami/kubectl@sha256:08afc880eea24f36572644ccae85fb3e573a6ff1b7161135a3ae9a5eab222df2
          command: [sh, -c]
          args:
            - |
              until kubectl get nodes.longhorn.io/"$NODE_NAME" -n longhorn-system >/dev/null 2>&1; do
                echo "waiting for longhorn node $NODE_NAME..."
                sleep 10
              done
              DISK_KEYS=$(kubectl get nodes.longhorn.io/"$NODE_NAME" -n longhorn-system \
                -o go-template='{{range $key, $_ := .spec.disks}}{{$key}} {{end}}')
              PATCH='{"spec":{"disks":{'
              FIRST=true
              for KEY in $DISK_KEYS; do
                [ "$FIRST" = "true" ] || PATCH="${PATCH},"
                PATCH="${PATCH}\"${KEY}\":{\"tags\":[\"durable\"]}"
                FIRST=false
              done
              PATCH="${PATCH}}}}"
              # check kubectl exit code so silent failures don't masquerade as success
              if ! kubectl patch nodes.longhorn.io/"$NODE_NAME" -n longhorn-system \
                --type=merge --patch "$PATCH"; then
                echo "patch failed; sleeping then exiting non-zero so the daemonset restarts us"
                sleep 30
                exit 1
              fi
              echo "tagged all disks on $NODE_NAME as durable"
              exec sleep infinity
          resources:
            requests:
              cpu: 1m
              memory: 20Mi
            limits:
              cpu: 50m
              memory: 64Mi
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
