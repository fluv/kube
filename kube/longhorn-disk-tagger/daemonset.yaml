apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: longhorn-disk-tagger
  namespace: longhorn-system
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: longhorn-disk-tagger
  template:
    metadata:
      labels:
        app.kubernetes.io/name: longhorn-disk-tagger
    spec:
      serviceAccountName: longhorn-disk-tagger
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values: [pi.home.arpa]
      containers:
        - name: tagger
          image: docker.io/bitnami/kubectl@sha256:e2b97dde9666986c61c56d49aae85a714b89b69392baa531438e74ec34096fb4
          command: [sh, -c]
          args:
            - |
              until kubectl get nodes.longhorn.io/"$NODE_NAME" -n longhorn-system >/dev/null 2>&1; do
                echo "waiting for longhorn node $NODE_NAME..."
                sleep 10
              done
              DISK_ENTRIES=$(kubectl get nodes.longhorn.io/"$NODE_NAME" -n longhorn-system \
                -o go-template='{{range $key, $disk := .spec.disks}}{{$key}}={{$disk.path}} {{end}}')
              PATCH='{"spec":{"disks":{'
              FIRST=true
              for ENTRY in $DISK_ENTRIES; do
                KEY="${ENTRY%%=*}"
                DISK_PATH="${ENTRY##*=}"
                case "$DISK_PATH" in
                  *archive*) TAG="archive" ;;
                  *)         TAG="durable" ;;
                esac
                [ "$FIRST" = "true" ] || PATCH="${PATCH},"
                PATCH="${PATCH}\"${KEY}\":{\"tags\":[\"${TAG}\"]}"
                FIRST=false
              done
              PATCH="${PATCH}}}}"
              if ! kubectl patch nodes.longhorn.io/"$NODE_NAME" -n longhorn-system \
                --type=merge --patch "$PATCH"; then
                echo "patch failed; sleeping then exiting non-zero so the daemonset restarts us"
                sleep 30
                exit 1
              fi
              echo "tagged all disks on $NODE_NAME"
              exec sleep infinity
          resources:
            requests:
              cpu: 1m
              memory: 20Mi
            limits:
              cpu: 50m
              memory: 64Mi
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
