apiVersion: v1
kind: ServiceAccount
metadata:
  name: longhorn-disk-tagger
  namespace: longhorn-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: longhorn-disk-tagger
  namespace: longhorn-system
rules:
  - apiGroups: [longhorn.io]
    resources: [nodes]
    verbs: [get, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: longhorn-disk-tagger
  namespace: longhorn-system
subjects:
  - kind: ServiceAccount
    name: longhorn-disk-tagger
    namespace: longhorn-system
roleRef:
  kind: Role
  name: longhorn-disk-tagger
  apiGroup: rbac.authorization.k8s.io
