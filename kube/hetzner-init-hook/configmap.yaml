# Generated by hetzner/generate-configmap.py — do not edit directly.
# Edit hetzner/update-cluster-config-secret.py or hetzner/cloud-init-template.yaml,
# then run: python3 hetzner/generate-configmap.py
apiVersion: v1
kind: ConfigMap
metadata:
  name: hcloud-init-updater
  namespace: kube-system
data:
  update-cluster-config-secret.py: |
    #!/usr/bin/env python3
    """
    Render cloud-init-template.yaml into the HCLOUD_CLUSTER_CONFIG JSON expected
    by the hetzner cluster-autoscaler (v9.x+ chart, post-HCLOUD_CLOUD_INIT format).

    Reads tailscale auth key and k3s token from the existing hcloud-init-data
    secret (data.ts-auth-key, data.k3s-token), substitutes them into the template,
    and writes the resulting cluster-config JSON to data.cluster-config of the
    same secret.

    Per-pool labels include kubernetes.io/os=linux so the autoscaler's template
    scheduling check passes for pods that nodeSelect on it (fluv/kube#258).

    Never prints secret values. Usage:
        python3 update-cluster-config-secret.py
        python3 update-cluster-config-secret.py --dry-run
    """
    import argparse, base64, json, subprocess, sys
    from pathlib import Path

    TEMPLATE = Path(__file__).parent / "cloud-init-template.yaml"
    SECRET_NAME = "hcloud-init-data"
    SECRET_NS = "kube-system"
    IMAGE = "ubuntu-24.04"
    # Hetzner network ID for k3s-private (10.30.0.0/16). Including this in
    # nodeConfigs ensures the network is attached at server-creation time, not as
    # a post-creation step. Post-creation attachment causes the Hetzner SDN to
    # skip initialising inbound routing for the node's private IP, breaking
    # flannel VxLAN from other nodes (confirmed on hetz-8gb, 2026-05-30).
    NETWORK_ID = 12239723

    POOLS = [
        {"name": "hetz-4gb-nbg1"},
        {"name": "hetz-4gb-hel1"},
        {"name": "hetz-8gb-hel1"},
        {"name": "hetz-16gb-hel1"},
        {"name": "hetz-32gb-hel1"},
    ]

    LABELS = {
        "kubernetes.io/os": "linux",
        # Required by hcloud-csi nodeSelector; CCM is not deployed so we set it here.
        "instance.hetzner.cloud/provided-by": "cloud",
    }


    def kubectl(*args, **kwargs):
        r = subprocess.run(["kubectl", *args], capture_output=True, text=True, **kwargs)
        if r.returncode != 0:
            print(f"kubectl error: {r.stderr.strip()}", file=sys.stderr)
            sys.exit(1)
        return r.stdout.strip()


    def get_secret_values():
        raw = kubectl("get", "secret", "-n", SECRET_NS, SECRET_NAME, "-o", "json")
        data = json.loads(raw)["data"]
        if "ts-auth-key" not in data or "k3s-token" not in data:
            print("ERROR: secret missing ts-auth-key or k3s-token", file=sys.stderr)
            sys.exit(1)
        ts = base64.b64decode(data["ts-auth-key"]).decode().strip()
        k3s = base64.b64decode(data["k3s-token"]).decode().strip()
        return ts, k3s


    def main():
        p = argparse.ArgumentParser()
        p.add_argument("--dry-run", action="store_true",
                       help="Print rendered cluster-config JSON (with secrets redacted) without applying")
        args = p.parse_args()

        ts_key, k3s_token = get_secret_values()

        template = TEMPLATE.read_text()
        cloud_init = template.replace("__TAILSCALE_AUTH_KEY__", ts_key) \
                             .replace("__K3S_TOKEN__", k3s_token)

        config = {
            "imagesForArch": {"amd64": IMAGE},
            "nodeConfigs": {
                pool["name"]: {
                    "cloudInit": cloud_init,
                    "labels": LABELS,
                    "networks": [NETWORK_ID],
                }
                for pool in POOLS
            },
        }
        config_json = json.dumps(config, indent=2)

        if args.dry_run:
            # Redact secrets before printing
            redacted = config_json.replace(ts_key, "<TS_KEY_REDACTED>") \
                                  .replace(k3s_token, "<K3S_TOKEN_REDACTED>")
            print(redacted)
            return

        # HCLOUD_CLUSTER_CONFIG must arrive at the autoscaler as base64-encoded JSON.
        # k8s decodes /data values once when mounting as env var, so double-encode:
        # outer for the secret wire format, inner for what the autoscaler parses.
        inner = base64.b64encode(config_json.encode()).decode()
        value = base64.b64encode(inner.encode()).decode()
        # Use add+replace to handle both first-time creation and updates
        test_get = kubectl("get", "secret", "-n", SECRET_NS, SECRET_NAME,
                           "-o", "jsonpath={.data.cluster-config}")
        op = "replace" if test_get else "add"
        patch = json.dumps([{"op": op, "path": "/data/cluster-config", "value": value}])

        print(f"Patching {SECRET_NS}/{SECRET_NAME} (op={op}, key=cluster-config)...")
        kubectl("patch", "secret", "-n", SECRET_NS, SECRET_NAME,
                "--type=json", f"--patch={patch}")
        print("Done.")


    if __name__ == "__main__":
        main()
  cloud-init-template.yaml: |
    #cloud-config
    # Template for Hetzner burst nodes. Secrets are substituted at secret-creation
    # time; the rendered, base64-encoded result lives in the hcloud-init-data
    # Kubernetes secret under the 'cloud-init' key.
    #
    # Substitution variables:
    #   __TAILSCALE_AUTH_KEY__  — ephemeral reusable auth key tagged tag:k3s
    #   __K3S_TOKEN__           — contents of /var/lib/rancher/k3s/server/node-token
    #
    # k3s server endpoint: saraneth via Tailscale MagicDNS (resolves to 100.95.187.35)
    # Tailnet: gentoo-mine.ts.net
    #
    # Nodes have a public IPv4 (HCLOUD_PUBLIC_IPV4=true) and are attached to the
    # k3s-private Hetzner private network (interface enp7s0, 10.30.0.0/16).
    # Tailscale carries control-plane traffic (kubelet ↔ API server) and enables
    # Pi/saraneth to reach hcloud overlay addresses. Pod-to-pod traffic between
    # hcloud nodes travels directly over the private network, bypassing Tailscale.
    # See docs/network-allocations.md for the full address plan.
    #
    # Access:
    #   - claude (user account, no sudo): ssh as claude with the pi-side kube key for
    #     diagnostic access from the autonomous Claude instance
    #   - root: ssh as root with zuzak's GitHub-listed keys for human admin access

    users:
      - default
      - name: claude
        shell: /bin/bash
        ssh_authorized_keys:
          # Pubkey is inlined; keep in sync with /home/claude/.ssh/id_ed25519_kube.pub
          # on the pi. If rotated, update here and re-run update-cloud-init-secret.py.
          - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAICx3FhQP0y+OKUoFw7CMKCsh4yQE/r4A2tC2M/sjWIdz claude@pi.home.arpa-kube

    runcmd:
      # Install Tailscale via apt (pkgs.tailscale.com has AAAA records, no IPv4 needed)
      - mkdir -p --mode=0755 /usr/share/keyrings
      - curl -fsSL https://pkgs.tailscale.com/stable/ubuntu/noble.noarmor.gpg -o /usr/share/keyrings/tailscale-archive-keyring.gpg
      - curl -fsSL https://pkgs.tailscale.com/stable/ubuntu/noble.tailscale-keyring.list -o /etc/apt/sources.list.d/tailscale.list
      - apt-get update -qq
      - apt-get install -y tailscale

      # Authorize zuzak's GitHub-listed keys for root ssh login before Tailscale
      # takes over DNS. Nodes have public IPv4 so github.com is directly reachable.
      - mkdir -p /root/.ssh
      - chmod 700 /root/.ssh
      - curl -fsSL https://github.com/zuzak.keys -o /root/.ssh/authorized_keys
      - chmod 600 /root/.ssh/authorized_keys

      # Join the tailnet. No exit node needed — public IPv4 is available.
      # --accept-routes: ingest subnet routes from other peers (needed to receive
      # the per-host /32 VTEP routes that other hcloud nodes advertise, so flannel
      # VXLAN packets from those nodes pass rp_filter on this node).
      - tailscale up --authkey=__TAILSCALE_AUTH_KEY__ --advertise-tags=tag:k3s --accept-routes --hostname=hcloud-$(curl -sf http://169.254.169.254/hetzner/v1/metadata/hostname)

      # Wait for Tailscale to assign an IP before attempting to reach the k3s API
      - until tailscale ip -4 2>/dev/null; do sleep 2; done

      # Wait for the Hetzner private network interface (enp7s0) to receive an IP.
      # The interface is present at boot (network attached at VM creation time)
      # but DHCP assignment takes a few seconds. enp7s0 is the consistent name for
      # the secondary VirtIO NIC on Hetzner Ubuntu 24.04 images (PCI bus 7, slot 0).
      - until ip addr show enp7s0 2>/dev/null | grep -q 'inet '; do sleep 2; done

      # Loose rp_filter: pod traffic from Pi/saraneth arrives via Tailscale subnet
      # routes on tailscale0, but the reverse route to those pod source IPs
      # (10.42.x.x) goes via flannel over enp7s0. Strict mode sees a mismatch and
      # drops the inbound packet.
      - sysctl -w net.ipv4.conf.all.rp_filter=2
      - sysctl -w net.ipv4.conf.enp7s0.rp_filter=2

      # Advertise this node's enp7s0 IP as a /32 host route over Tailscale so Pi and
      # saraneth can route flannel VXLAN packets directly to the correct node.
      # A /32 per-host route is used rather than a regional /24 because Hetzner does
      # not guarantee that IPs are allocated from the per-region subnet defined in
      # docs/network-allocations.md — e.g. an fsn1 node may receive a 10.30.3.x IP
      # (the hel1 subnet) if Hetzner's allocator assigns sequentially from a shared
      # pool. A /32 is always correct regardless of actual allocation; a /24 can be
      # wrong and cause VXLAN traffic to be relayed via the wrong node.
      # The tag:k3s autoApprover in the tailnet ACL approves this automatically.
      - tailscale set --advertise-routes=$(ip -4 addr show enp7s0 | awk '/inet /{split($2,a,"/"); print a[1]"/32"; exit}')

      # Join the cluster as an agent node.
      # --node-ip: register the Tailscale IP so the control plane can reach this node.
      # --flannel-iface: route pod overlay traffic over the private network for
      #   hcloud-to-hcloud efficiency; Pi/saraneth reach the VTEP via Tailscale subnet routes.
      # --kubelet-arg=provider-id: tells hcloud CCM which Hetzner server this is.
      - >
        curl -sfL https://get.k3s.io |
        K3S_URL=https://saraneth.gentoo-mine.ts.net:6443
        K3S_TOKEN=__K3S_TOKEN__
        sh -s - agent
        --kubelet-arg=provider-id=hcloud://$(curl -sf http://169.254.169.254/hetzner/v1/metadata/instance-id)
        --node-ip=$(tailscale ip -4)
        --node-external-ip=$(curl -sf http://169.254.169.254/hetzner/v1/metadata/public-ipv4)
        --flannel-iface=enp7s0
