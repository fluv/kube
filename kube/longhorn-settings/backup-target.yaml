# Longhorn v1.7+ moved backup-target and backup-target-credential-secret out of
# the Setting kind into this dedicated BackupTarget CRD. The cluster runs v1.10,
# whose mutating webhook rejects the old Settings ("setting does not exist"),
# failing the kube app sync. The "default" BackupTarget is auto-created empty by
# Longhorn; this declaratively populates it. See fluv/kube#481.
apiVersion: longhorn.io/v1beta2
kind: BackupTarget
metadata:
  name: default
  namespace: longhorn-system
spec:
  backupTargetURL: "s3://longhorn.k3s.fluv.net@eu-central-003/"
  credentialSecret: "longhorn-b2-secret"
  # Poll lists the whole backup store every interval, per backup volume. At 5m
  # with ~11 volumes this generated ~3,400 Backblaze B2 Class C (list) calls/day,
  # exceeding the free 2,500/day cap and leaving the target Unavailable (it failed
  # before the 02:00 backup even ran — pure idle-poll cost). 1h gives ample
  # headroom (~300/day) while keeping externally-made backup changes in sync.
  pollInterval: "1h0m0s"
