apiVersion: v1
kind: ServiceAccount
metadata:
  name: tf2-knocker
  namespace: tf2
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tf2-knocker
  namespace: tf2
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["tf2"]
    verbs: ["get"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    resourceNames: ["tf2"]
    verbs: ["get", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tf2-knocker
  namespace: tf2
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tf2-knocker
subjects:
  - kind: ServiceAccount
    name: tf2-knocker
    namespace: tf2
