apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: logging-stack
  namespace: loki
  labels:
    release: prometheus
spec:
  groups:
    - name: loki-storage
      rules:
        - alert: LokiPVCNearlyFull
          expr: |
            (kubelet_volume_stats_used_bytes{namespace="loki"}
              / kubelet_volume_stats_capacity_bytes{namespace="loki"}) > 0.80
          for: 15m
          labels:
            severity: warning
            component: loki
          annotations:
            summary: "Loki PVC {{ $labels.persistentvolumeclaim }} is {{ $value | humanizePercentage }} full"
            description: "Loki is the authoritative store; once the PVC fills, ingest stalls. Increase the PVC, tighten retention, or investigate a log spike."
        - alert: LokiPVCCritical
          expr: |
            (kubelet_volume_stats_used_bytes{namespace="loki"}
              / kubelet_volume_stats_capacity_bytes{namespace="loki"}) > 0.92
          for: 5m
          labels:
            severity: critical
            component: loki
          annotations:
            summary: "Loki PVC {{ $labels.persistentvolumeclaim }} is {{ $value | humanizePercentage }} full — ingest imminent"
            description: "Act now: expand the PVC or delete old chunks before ingest halts."

    - name: loki-ingest
      rules:
        - alert: LokiDown
          expr: up{job=~".*loki.*", namespace="loki"} == 0
          for: 10m
          labels:
            severity: critical
            component: loki
          annotations:
            summary: "Loki scrape target {{ $labels.instance }} is down"
            description: "Prometheus has been unable to scrape Loki for 10 minutes. Check the pod and its PVC."
        - alert: LokiIngestStalled
          expr: |
            (sum(rate(loki_distributor_bytes_received_total[10m])) == 0)
            and (sum(up{job=~".*loki.*", namespace="loki"}) > 0)
          for: 30m
          labels:
            severity: warning
            component: loki
          annotations:
            summary: "Loki is up but not ingesting any log bytes"
            description: "The Loki pod reports healthy but no bytes have been received for 30 minutes. Alloy may have stopped shipping, or a rate limit has been hit."
        - alert: LokiRejectingWrites
          expr: |
            sum(rate(loki_discarded_samples_total[10m])) by (reason) > 0
          for: 15m
          labels:
            severity: warning
            component: loki
          annotations:
            summary: "Loki is dropping log lines (reason: {{ $labels.reason }})"
            description: "Loki has been discarding incoming lines for 15 minutes. Check ingestion limits and stream cardinality."

    - name: alloy-delivery
      rules:
        - alert: AlloyDown
          expr: up{job=~".*alloy.*", namespace="alloy"} == 0
          for: 10m
          labels:
            severity: warning
            component: alloy
          annotations:
            summary: "Alloy scrape target {{ $labels.instance }} is down"
            description: "The Alloy DaemonSet pod on {{ $labels.instance }} cannot be scraped. Logs from that node are not being shipped."
        - alert: AlloyDroppingLogs
          expr: |
            sum(rate(loki_write_dropped_bytes_total[15m])) by (pod) > 0
          for: 15m
          labels:
            severity: warning
            component: alloy
          annotations:
            summary: "Alloy pod {{ $labels.pod }} is dropping log bytes on send"
            description: "Alloy has been unable to deliver logs to Loki for 15 minutes (queue full or Loki rejecting). Check Loki health and alloy_write errors."
        - alert: AlloyPartialNodeCoverage
          expr: |
            count(up{job=~".*alloy.*", namespace="alloy"} == 1)
              < count(kube_node_info)
          for: 20m
          labels:
            severity: warning
            component: alloy
          annotations:
            summary: "Alloy is not running on every node"
            description: "Fewer healthy Alloy pods than cluster nodes — at least one node's logs are not being collected."
        - alert: AlloyPodRestarted
          expr: |
            increase(kube_pod_container_status_restarts_total{
              namespace="alloy",
              container="alloy"
            }[30m]) > 0
          for: 5m
          labels:
            severity: warning
            component: alloy
          annotations:
            summary: "Alloy pod {{ $labels.pod }} restarted"
            description: "An Alloy pod restarted in the last 30 minutes. Log positions are not persisted across restarts, so the pod will replay log files from startup, flooding Loki with HTTP 400 'entry too old' errors. If /var/lib/alloy is mounted as a hostPath, verify the mount is present and the pod resumed cleanly."

    - name: pod-health
      rules:
        - alert: PodFailed
          expr: kube_pod_status_phase{phase="Failed"} == 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is in Failed state"
            description: "Pod has been in Failed phase for 5 minutes. Check logs and events."
        - alert: PodUnknown
          expr: kube_pod_status_phase{phase="Unknown"} == 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is in Unknown state"
            description: "Node has lost contact with this pod. Check node health."
        - alert: PodPendingTooLong
          expr: kube_pod_status_phase{phase="Pending"} == 1
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has been Pending for 30 minutes"
            description: "Pod cannot schedule — check resource requests, node taints, and PVC binding."

    - name: node-load
      rules:
        - alert: NodeHighLoad
          expr: |
            node_load5
              / on(instance) group_left()
              count without(cpu, mode) (node_cpu_seconds_total{mode="idle"})
            > 1.5
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Node {{ $labels.instance }} load is {{ $value | printf \"%.1f\" }}x CPU count"
            description: "5-minute load average has been above 1.5x CPU count for 10 minutes."

    - name: prometheus-storage
      rules:
        - alert: PrometheusPVCNearlyFull
          expr: |
            (kubelet_volume_stats_used_bytes{persistentvolumeclaim=~"prometheus-.*|alertmanager-.*"}
              / kubelet_volume_stats_capacity_bytes{persistentvolumeclaim=~"prometheus-.*|alertmanager-.*"}) > 0.80
          for: 15m
          labels:
            severity: warning
            component: prometheus
          annotations:
            summary: "Prometheus PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} is {{ $value | humanizePercentage }} full"
            description: "Once the PVC fills Prometheus stops ingesting samples. Tighten retention or retentionSize, or grow the volume."
        - alert: PrometheusPVCCritical
          expr: |
            (kubelet_volume_stats_used_bytes{persistentvolumeclaim=~"prometheus-.*|alertmanager-.*"}
              / kubelet_volume_stats_capacity_bytes{persistentvolumeclaim=~"prometheus-.*|alertmanager-.*"}) > 0.92
          for: 5m
          labels:
            severity: critical
            component: prometheus
          annotations:
            summary: "Prometheus PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} is {{ $value | humanizePercentage }} full — ingest imminent"
            description: "Act now: tighten retention, grow the PVC, or scale down ingest before Prometheus halts."
    - name: claude-mcp
      rules:
        - alert: ClaudePrometheusMCPLifestyleDown
          # The Helm release name is prometheus-mcp-lifestyle; the chart appends
          # its own name, so the Deployment is prometheus-mcp-lifestyle-prometheus-mcp-server.
          # The bare release name matches no kube-state-metrics series.
          #
          # The spec_replicas guard makes this alert mean "should have replicas but
          # has none" rather than "has none". A Deployment deliberately scaled to
          # zero is not an outage, and kube-state-metrics keeps publishing
          # replicas_ready=0 for it indefinitely.
          expr: |
            kube_deployment_status_replicas_ready{deployment="prometheus-mcp-lifestyle-prometheus-mcp-server", namespace="claude"} == 0
            and
            kube_deployment_spec_replicas{deployment="prometheus-mcp-lifestyle-prometheus-mcp-server", namespace="claude"} > 0
          for: 10m
          labels:
            severity: warning
            component: claude-mcp
          annotations:
            summary: "prometheus-mcp-lifestyle has no ready replicas"
            description: "The lifestyle Prometheus MCP server has had 0 ready replicas for 10 minutes despite being scheduled to run. Claude cannot query lifestyle metrics (Awair, LG TV). Check the Deployment in the claude namespace."

        - alert: ClaudePrometheusMCPDown
          # Counterpart to ClaudePrometheusMCPLifestyleDown, for the cluster
          # Prometheus MCP. Same spec_replicas guard: inert while the Deployment
          # is deliberately at zero, live again the moment it is restored.
          expr: |
            kube_deployment_status_replicas_ready{deployment="prometheus-mcp-prometheus-mcp-server", namespace="claude"} == 0
            and
            kube_deployment_spec_replicas{deployment="prometheus-mcp-prometheus-mcp-server", namespace="claude"} > 0
          for: 10m
          labels:
            severity: warning
            component: claude-mcp
          annotations:
            summary: "prometheus-mcp has no ready replicas"
            description: "The cluster Prometheus MCP server has had 0 ready replicas for 10 minutes despite being scheduled to run. Claude cannot query cluster metrics. Check the Deployment in the claude namespace."
