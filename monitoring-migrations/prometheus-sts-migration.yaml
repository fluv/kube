apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus-migrator
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: prometheus-migrator
  namespace: monitoring
rules:
  - apiGroups: [monitoring.coreos.com]
    resources: [prometheuses]
    verbs: [get]
  - apiGroups: [apps]
    resources: [statefulsets]
    verbs: [delete, get]
  - apiGroups: [""]
    resources: [persistentvolumeclaims]
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: prometheus-migrator
  namespace: monitoring
subjects:
  - kind: ServiceAccount
    name: prometheus-migrator
    namespace: monitoring
roleRef:
  kind: Role
  name: prometheus-migrator
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: prometheus-hcloud-migration
  namespace: monitoring
spec:
  template:
    spec:
      serviceAccountName: prometheus-migrator
      restartPolicy: Never
      containers:
        - name: migrator
          image: bitnami/kubectl:1.33.1
          command:
            - sh
            - -c
            - |
              echo "Checking pre-populated PVC exists and is Bound..."
              pvc_phase=$(kubectl get pvc prom-hcloud-db-prometheus-prometheus-kube-prometheus-0 \
                -n monitoring -o jsonpath='{.status.phase}' 2>/dev/null)
              if [ "$pvc_phase" != "Bound" ]; then
                echo "ERROR: pre-populated PVC is not Bound (phase: ${pvc_phase:-NotFound}). Aborting."
                exit 1
              fi
              echo "PVC is Bound. Waiting for Prometheus CR to reference hcloud-volumes..."
              until kubectl get prometheus prometheus-kube-prometheus -n monitoring \
                -o jsonpath='{.spec.storage.volumeClaimTemplate.spec.storageClassName}' 2>/dev/null \
                | grep -q hcloud-volumes; do
                sleep 5
              done
              echo "CR updated. Deleting old StatefulSet so operator recreates with new VCT..."
              kubectl delete sts prometheus-prometheus-kube-prometheus -n monitoring --ignore-not-found
              echo "Done."
  backoffLimit: 3
