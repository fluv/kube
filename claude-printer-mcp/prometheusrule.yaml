apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: printer-mcp
  namespace: claude-printer-mcp
  labels:
    release: prometheus
spec:
  groups:
    - name: printer-mcp-ingress
      rules:
        # If the basic-auth secret goes missing or is misconfigured the
        # nginx-ingress controller returns 503 for every request without
        # surfacing the failure anywhere obvious — Douglas would notice only
        # by trying to call the MCP from claude.ai. This alert covers that
        # blind spot. 0.05 req/s sustained for 5m is well above background
        # noise but well below "anyone is actually trying to use the service".
        - alert: PrinterMcpIngress5xx
          expr: |
            sum by (ingress) (
              rate(nginx_ingress_controller_requests{
                exported_namespace="claude-printer-mcp",
                status=~"5.."
              }[5m])
            ) > 0.05
          for: 5m
          labels:
            severity: warning
            component: printer-mcp
          annotations:
            summary: "printer-mcp ingress serving 5xx ({{ $value | humanize }} req/s)"
            description: "ingress-nginx is returning 5xx from {{ $labels.ingress }}. Most common cause is the basic-auth secret missing or malformed — see claude-printer-mcp/README.md."
