apiVersion: apps/v1
kind: Deployment
metadata:
  name: printer-mcp
  namespace: claude-printer-mcp
spec:
  # Single replica is load-bearing: per-job state lives in-process (JobStore
  # dict) so watch_page can find a job submitted by an earlier print_latex
  # call. Two replicas would split jobs incoherently across pods. Same
  # constraint as claude-grocy and the other MCP servers; recorded
  # explicitly here because the printer-mcp design (discussions/890)
  # specifically depends on per-page reveal state surviving across calls.
  #
  # Recreate strategy keeps the single-replica invariant during rolls
  # (no two pods alive simultaneously, even briefly).
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: printer-mcp
  template:
    metadata:
      labels:
        app: printer-mcp
    spec:
      # No fsGroup — there's no mounted volume for the kubelet to chown.
      # Per-job state is in-process; tempdirs live in /tmp inside the
      # container's writable ephemeral layer.
      #
      # runAsNonRoot + runAsUser are belt-and-braces: the upstream Dockerfile
      # already drops to uid 1000 via USER app, but pinning both at the pod
      # level means the kubelet refuses to start the container if a future
      # image regression ever loses the USER directive.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: printer-mcp
          image: ghcr.io/fluv/printer-mcp:1.3.0@sha256:ec351886cf6933885db773de6ae6c1b7e32f7c022ebcb689ebcc53550f39ea26
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          env:
            - name: PRINTER_MCP_DRY_RUN
              value: "false"
            - name: PRINTER_MCP_BASE_URL
              value: "https://printer.mcp.k3s.fluv.net"
          resources:
            requests:
              cpu: 10m
              # Python + uvicorn at idle sits around 50-80Mi.
              memory: 64Mi
            limits:
              # texlive compilation can spike well past idle. 512Mi gives
              # plenty of headroom for multi-page documents without risking
              # OOM during a print job.
              memory: 512Mi
