apiVersion: apps/v1
kind: Deployment
metadata:
  name: printer-mcp
  namespace: claude-printer-mcp
spec:
  # Single replica is load-bearing: when the implementation lands, per-job
  # state lives on the PVC and in-process. Two replicas would split jobs
  # incoherently across pods. Same constraint as claude-grocy and the other
  # MCP servers; recorded explicitly here because the printer-mcp design
  # (discussions/890) specifically depends on per-page reveal state.
  #
  # Recreate strategy because the PVC is RWO Longhorn — two pods can't mount
  # it simultaneously during a RollingUpdate.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: printer-mcp
  template:
    metadata:
      labels:
        app: printer-mcp
    spec:
      # Pin to the Pi: the printer is at 192.168.1.251 on the home LAN, and
      # while saraneth and any Hetzner autoscaler nodes can technically
      # reach the LAN via Tailscale, every IPP submission would round-trip
      # over the WAN — see the 2026-05-14 Longhorn-over-WAN bandwidth
      # incident. Pi-only is also fail-closed: if the Pi is offline,
      # printing wouldn't work from anywhere else anyway, so refusing to
      # schedule is the honest signal.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - pi.home.arpa
      # Longhorn provisions PVCs owned by root, but the printer-mcp image
      # runs as uid 1000 (see fluv/printer-mcp Dockerfile). fsGroup makes
      # the kubelet chown /data to gid 1000 on pod start so the process
      # can write per-job state once the implementation lands. Mirrors the
      # claude-notebook pattern.
      #
      # runAsNonRoot + runAsUser are belt-and-braces: the upstream Dockerfile
      # already drops to uid 1000 via USER app, but pinning both at the pod
      # level means the kubelet refuses to start the container if a future
      # image regression ever loses the USER directive.
      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: printer-mcp
          image: ghcr.io/fluv/printer-mcp:main@sha256:f72ebc75ab37cf683438d8a584ef3e5f4c2132b6d50495398fd9d2a0f57690b8
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 10m
              # Python + uvicorn at idle sits around 50-80Mi.
              memory: 64Mi
            limits:
              # texlive compilation can spike well past idle. 512Mi gives
              # plenty of headroom for multi-page documents without risking
              # OOM during a print job.
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: printer-mcp-data
