apiVersion: apps/v1
kind: Deployment
metadata:
  name: printer-mcp
  namespace: claude-printer-mcp
spec:
  # Single replica is load-bearing: per-job state lives in-process (JobStore
  # dict) so watch_page can find a job submitted by an earlier print_latex
  # call. Two replicas would split jobs incoherently across pods. Same
  # constraint as claude-grocy and the other MCP servers; recorded
  # explicitly here because the printer-mcp design (discussions/890)
  # specifically depends on per-page reveal state surviving across calls.
  #
  # Recreate strategy keeps the single-replica invariant during rolls
  # (no two pods alive simultaneously, even briefly).
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: printer-mcp
  template:
    metadata:
      labels:
        app: printer-mcp
    spec:
      # Pin to the Pi: the printer is at 192.168.1.251 on the home LAN, and
      # while saraneth and any Hetzner autoscaler nodes can technically
      # reach the LAN via Tailscale, every IPP submission would round-trip
      # over the WAN — see the 2026-05-14 Longhorn-over-WAN bandwidth
      # incident. Pi-only is also fail-closed: if the Pi is offline,
      # printing wouldn't work from anywhere else anyway, so refusing to
      # schedule is the honest signal.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - pi.home.arpa
      # No fsGroup — there's no mounted volume for the kubelet to chown.
      # Per-job state is in-process; tempdirs live in /tmp inside the
      # container's writable ephemeral layer.
      #
      # runAsNonRoot + runAsUser are belt-and-braces: the upstream Dockerfile
      # already drops to uid 1000 via USER app, but pinning both at the pod
      # level means the kubelet refuses to start the container if a future
      # image regression ever loses the USER directive.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: printer-mcp
          image: ghcr.io/fluv/printer-mcp:1.2.0@sha256:39e30411159bc370e4e5ebc1277b90591d3010b147a1ad25909490fa4c3c958e
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 10m
              # Python + uvicorn at idle sits around 50-80Mi.
              memory: 64Mi
            limits:
              # texlive compilation can spike well past idle. 512Mi gives
              # plenty of headroom for multi-page documents without risking
              # OOM during a print job.
              memory: 512Mi
