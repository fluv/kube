---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zkzhome
  namespace: zkzhome
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zkzhome
  template:
    metadata:
      labels:
        app: zkzhome
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: zkzhome
          image: ghcr.io/zuzak/zkzhome@sha256:7d4afd93eeee625feaaefd9667ac701a3e8b8dffa5b8b184dc2629f9c0a9fc36
          env:
            - name: PORT
              value: "8080"
            - name: DISCORD_GUILD_ID
              valueFrom:
                secretKeyRef:
                  name: discord
                  key: guild-id
                  optional: true
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 10m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
