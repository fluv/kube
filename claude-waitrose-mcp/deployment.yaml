apiVersion: apps/v1
kind: Deployment
metadata:
  name: waitrose-mcp
  namespace: claude-waitrose-mcp
spec:
  # Single replica is load-bearing: the MCP SDK's StreamableHTTP transport
  # keeps per-session state in memory. Multiple replicas would serve
  # incompatible sessions depending on which pod a request hits. Same
  # constraint as claude-grocy and claude-vestibule.
  #
  # Scaled to zero: Claude usage paused (#748). Restore with `git revert`.
  replicas: 0
  selector:
    matchLabels:
      app: waitrose-mcp
  template:
    metadata:
      labels:
        app: waitrose-mcp
    spec:
      containers:
        - name: waitrose-mcp
          image: ghcr.io/fluv/waitrose-mcp:main@sha256:4d12ede5a5362b937edf91d3d862c5212daf19c5e5fa75faafc5a304a25ed226
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          envFrom:
            - secretRef:
                name: waitrose-credentials
                optional: true
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 256Mi
