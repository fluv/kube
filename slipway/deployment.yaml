apiVersion: apps/v1
kind: Deployment
metadata:
  name: slipway
  namespace: slipway
  labels:
    app: slipway
spec:
  replicas: 0
  selector:
    matchLabels:
      app: slipway
  template:
    metadata:
      labels:
        app: slipway
    spec:
      priorityClassName: cluster-low
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: slipway
          # Digest-pinned; Renovate maintains the pin, matching the
          # vestibule pattern.
          image: ghcr.io/fluv/slipway:main@sha256:eef6d08c48a4334156651566707481b7a63342b057efcee433687284758ea369
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: GROCY_URL
              value: "http://grocy.grocy.svc.cluster.local"
            - name: GROCY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: grocy-api-key
                  key: GROCY_APIKEY_VALUE
                  # Post-merge optional: without the secret the Grocy source
                  # degrades to "unavailable" on the page; the pod stays up.
                  optional: true
            - name: PROM_URL
              value: "http://prometheus-lifestyle.lifestyle.svc.cluster.local:9090"
            - name: SLIPWAY_FACTS
              value: "Humidity|meaco_current_humidity_percent|%;Target humidity|meaco_target_humidity_percent|%"
            - name: SLIPWAY_HOME
              valueFrom:
                secretKeyRef:
                  name: slipway-home
                  key: SLIPWAY_HOME
                  # Post-merge optional: without the secret the app falls back
                  # to its neutral city-centre default coordinate.
                  optional: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 60
