apiVersion: apps/v1
kind: Deployment
metadata:
  name: vestibule
  namespace: claude-vestibule
  annotations:
    # Vestibule must be Ready before vestibule-mcp starts, because the MCP
    # fetches /_manifest at startup. Vestibule is wave 0; the MCP is wave 1.
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vestibule
  template:
    metadata:
      labels:
        app: vestibule
    spec:
      containers:
        - name: vestibule
          image: ghcr.io/fluv/vestibule:main
          imagePullPolicy: Always
          env:
            - name: VESTIBULE_CONFIG
              value: /etc/vestibule/config.yaml
          ports:
            - name: http
              containerPort: 8080
            - name: metrics
              containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/vestibule
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi
      volumes:
        - name: config
          secret:
            secretName: vestibule-config
            items:
              - key: config.yaml
                path: config.yaml
