apiVersion: v1
kind: ServiceAccount
metadata:
  name: claude
  namespace: claude
---
# Long-lived token for Claude's kubeconfig.
# k8s 1.24+ no longer auto-creates SA tokens; this Secret causes the
# token controller to populate .data.token.
apiVersion: v1
kind: Secret
metadata:
  name: claude-token
  namespace: claude
  annotations:
    kubernetes.io/service-account.name: claude
type: kubernetes.io/service-account-token
---
# Cluster-wide read access — explicit resource list, all namespaces.
# Secrets are intentionally excluded; Claude reads secrets only where
# a targeted RoleBinding via claude-namespace-admin grants it
# (currently: claude, claude-grocy, claude-waitrose-mcp, claude-asda-mcp,
# claude-vestibule, claude-notebook, claude-printer-mcp,
# longhorn-system, cert-manager).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: claude-read
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - pods/status
      - nodes
      - namespaces
      - services
      - endpoints
      - configmaps
      - persistentvolumes
      - persistentvolumeclaims
      - replicationcontrollers
      - resourcequotas
      - limitranges
      - serviceaccounts
      - events
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - daemonsets
      - replicasets
      - controllerrevisions
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - ingressclasses
      - networkpolicies
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources:
      - storageclasses
      - volumeattachments
      - csidrivers
      - csinodes
    verbs: ["get", "list", "watch"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources:
      - clusterroles
      - clusterrolebindings
      - roles
      - rolebindings
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources:
      - customresourcedefinitions
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources:
      - pods
      - nodes
    verbs: ["get", "list"]
  - apiGroups: ["longhorn.io"]
    resources:
      - volumes
      - volumeattachments
      - engines
      - replicas
      - settings
      - nodes
      - disks
      - backups
      - backupvolumes
      - backuptargets
      - snapshots
      - instancemanagers
      - engineimages
      - recurringjobs
      - orphans
      - systembackups
      - systemrestores
      - sharemanagers
    verbs: ["get", "list", "watch"]
  - apiGroups: ["argoproj.io"]
    resources:
      - applications
      - applicationsets
      - appprojects
    verbs: ["get", "list", "watch"]
  - apiGroups: ["cert-manager.io"]
    resources:
      - certificates
      - certificaterequests
      - clusterissuers
      - issuers
    verbs: ["get", "list", "watch"]
  - apiGroups: ["acme.cert-manager.io"]
    resources:
      - challenges
      - orders
    verbs: ["get", "list", "watch"]
  - apiGroups: ["monitoring.coreos.com"]
    resources:
      - prometheusrules
      - servicemonitors
      - podmonitors
      - probes
      - alertmanagers
      - prometheuses
    verbs: ["get", "list", "watch"]
  - apiGroups: ["policy"]
    resources:
      - poddisruptionbudgets
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["*"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: claude-read
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: claude-read
subjects:
  - kind: ServiceAccount
    name: claude
    namespace: claude
---
# Write access scoped to individual namespaces via RoleBindings.
# Claude can write Secrets (credential rotation) and exec into pods
# (live debugging) only in namespaces that carry a RoleBinding for
# this ClusterRole.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: claude-namespace-admin
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods/exec", "pods/portforward"]
    verbs: ["create"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale", "statefulsets/scale"]
    verbs: ["get", "create", "update", "patch"]
  # Allow deleting pods so DaemonSet/StatefulSet pods can be recycled
  # (e.g. stale-IP recovery after CNI changes — scale 0→1 doesn't help
  # for DaemonSets). Pods are not GitOps-managed; the controller
  # recreates from declared spec, so this can't bypass ArgoCD.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["delete"]
---
# Cluster-wide role for Longhorn volume recovery operations.
# Needed for clearing failedAt on stuck replicas during volume salvage,
# or setting salvageRequested on engines. These are runtime state
# managed by Longhorn itself, not declared in git — patching them does
# not bypass GitOps.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: claude-longhorn-recovery
rules:
  - apiGroups: ["longhorn.io"]
    resources: ["replicas", "engines", "volumes"]
    verbs: ["patch", "update"]
---
# Grant write access in the claude namespace itself.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: claude
  namespace: claude
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: claude-namespace-admin
subjects:
  - kind: ServiceAccount
    name: claude
    namespace: claude
---
# Full namespace-admin in the claude namespace as scratch space.
# Lets Claude run debug pods (kubectl run, kubectl debug) instead of
# execing into random app pods that bring their own networking quirks.
# Scoped strictly to the claude namespace; no cluster-wide impact.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: claude-scratch
  namespace: claude
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin
subjects:
  - kind: ServiceAccount
    name: claude
    namespace: claude
---
# Grant write access in the claude-grocy namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: claude
  namespace: claude-grocy
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: claude-namespace-admin
subjects:
  - kind: ServiceAccount
    name: claude
    namespace: claude
---
# Grant write access in the claude-waitrose-mcp namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: claude
  namespace: claude-waitrose-mcp
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: claude-namespace-admin
subjects:
  - kind: ServiceAccount
    name: claude
    namespace: claude
---
# Grant write access in the claude-asda-mcp namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: claude
  namespace: claude-asda-mcp
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: claude-namespace-admin
subjects:
  - kind: ServiceAccount
    name: claude
    namespace: claude
---
# Grant write access in the claude-vestibule namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: claude
  namespace: claude-vestibule
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: claude-namespace-admin
subjects:
  - kind: ServiceAccount
    name: claude
    namespace: claude
---
# Grant write access in the claude-notebook namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: claude
  namespace: claude-notebook
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: claude-namespace-admin
subjects:
  - kind: ServiceAccount
    name: claude
    namespace: claude
---
# Grant write access in the claude-printer-mcp namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: claude
  namespace: claude-printer-mcp
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: claude-namespace-admin
subjects:
  - kind: ServiceAccount
    name: claude
    namespace: claude
---
# Grant pod-recycle access in longhorn-system. Needed for stale-IP
# recovery on Longhorn DaemonSets (longhorn-manager, longhorn-csi-plugin,
# engine-image) after CNI/networking changes.
# Uses claude-pod-restart (pods/delete only), not claude-namespace-admin,
# to avoid granting pods/exec in a namespace that runs root containers
# (longhorn-driver-deployer runs as UID 0).
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: claude
  namespace: longhorn-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: claude-pod-restart
subjects:
  - kind: ServiceAccount
    name: claude
    namespace: claude
---
# Grant Longhorn replica/engine/volume patch access for volume recovery
# operations (clearing failedAt on stuck replicas, requesting salvage).
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: claude-longhorn-recovery
  namespace: longhorn-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: claude-longhorn-recovery
subjects:
  - kind: ServiceAccount
    name: claude
    namespace: claude
---
# Grant pod-recycle access in cert-manager. Needed for stale-IP recovery
# on cert-manager pods after CNI/networking changes.
# Uses claude-pod-restart (pods/delete only), not claude-namespace-admin,
# to avoid over-granting exec and secrets access.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: claude
  namespace: cert-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: claude-pod-restart
subjects:
  - kind: ServiceAccount
    name: claude
    namespace: claude
---
# Minimal role for restarting pods only — no secrets, no exec, no scale.
# Used for namespaces where the operator owns everything except
# occasional pod-level recycling (e.g. tailscale operator-managed
# proxy pods that wedge into magicsock derp/STUN flap state).
# WARNING: bind via RoleBinding (namespace-scoped), not ClusterRoleBinding.
# A ClusterRoleBinding would grant pods/delete across all namespaces.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: claude-pod-restart
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["delete"]
---
# Grant pod-restart access in tailscale namespace. Allows recycling
# wedged ts-* proxy pods (derp-route thrash, STUN endpoint flap)
# without needing Douglas. Operator recreates from declared spec, so
# this can't bypass GitOps. See fluv/claude#533, #534.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: claude-pod-restart
  namespace: tailscale
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: claude-pod-restart
subjects:
  - kind: ServiceAccount
    name: claude
    namespace: claude
