# Claude Code telemetry Prometheus — receives OTLP via remote_write from Alloy,
# and scrapes ServiceMonitors labelled prometheus: claude in the claude namespace.
# Separated from cluster Prometheus per zuzak/.claude#408.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus-claude
  namespace: claude
---
apiVersion: monitoring.coreos.com/v1
kind: Prometheus
metadata:
  name: claude
  namespace: claude
spec:
  replicas: 1
  serviceAccountName: prometheus-claude
  # remote-write-receiver is no longer an --enable-feature flag in Prometheus 3.x;
  # it is a separate --web flag.
  additionalArgs:
    - name: web.enable-remote-write-receiver
  securityContext:
    fsGroup: 65534
    runAsUser: 65534
    runAsNonRoot: true
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 512Mi
  retention: 30d
  storage:
    volumeClaimTemplate:
      spec:
        storageClassName: longhorn-durable
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
  serviceMonitorSelector:
    matchLabels:
      prometheus: claude
  serviceMonitorNamespaceSelector:
    matchLabels:
      prometheus: claude
  podMonitorSelector:
    matchLabels:
      prometheus: claude
  podMonitorNamespaceSelector:
    matchLabels:
      prometheus: claude
  ruleSelector:
    matchLabels:
      prometheus: claude
  ruleNamespaceSelector:
    matchLabels:
      prometheus: claude
  priorityClassName: cluster-low
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-claude
  namespace: claude
spec:
  type: ClusterIP
  selector:
    prometheus: claude
  ports:
    - name: web
      port: 9090
      targetPort: 9090
---
# Grafana datasource: sidecar watches ConfigMaps labelled grafana_datasource=1 cluster-wide.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource-claude-prometheus
  namespace: claude
  labels:
    grafana_datasource: "1"
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Claude Prometheus
        uid: claude-prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-claude.claude.svc.cluster.local:9090
        isDefault: false
        jsonData:
          timeInterval: 15s
