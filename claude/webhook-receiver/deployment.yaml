apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-receiver
  namespace: claude
spec:
  # Single replica is fine — receiver is stateless v1 (logs only).
  # When the event-log file is added, this becomes load-bearing
  # (single writer; multiple replicas would interleave writes).
  replicas: 1
  selector:
    matchLabels:
      app: webhook-receiver
  template:
    metadata:
      labels:
        app: webhook-receiver
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - pi.home.arpa
      containers:
        - name: webhook-receiver
          image: python:3.13-slim
          command: ["/bin/sh", "-c"]
          # Stock Python image — pip-install at startup; promote to a baked
          # image once GitHub Actions billing resets (tracked in #816).
          args:
            - |
              set -e
              pip install --quiet --no-cache-dir aiohttp==3.10.10 PyJWT==2.9.0 cryptography>=41.0 prometheus-client>=0.20
              exec python /app/script.py
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: deepseek-reviewer-app
                  key: webhook-secret
            - name: GITHUB_APP_ID
              valueFrom:
                secretKeyRef:
                  name: deepseek-reviewer-app
                  key: app-id
            - name: GITHUB_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: deepseek-reviewer-app
                  key: private-key
            - name: BOT_LOGIN
              value: deepseek-reviewer[bot]
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: deepseek
                  key: api-key
                  optional: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            # pip install now includes PyJWT + cryptography; ~30s on Pi LAN.
            initialDelaySeconds: 30
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          volumeMounts:
            - name: script
              mountPath: /app
          resources:
            requests:
              cpu: 10m
              memory: 128Mi
            limits:
              memory: 512Mi
      volumes:
        - name: script
          configMap:
            name: webhook-receiver-script
