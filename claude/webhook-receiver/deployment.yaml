apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-receiver
  namespace: claude
spec:
  # Single replica is fine — receiver is stateless v1 (logs only).
  # When the event-log file is added, this becomes load-bearing
  # (single writer; multiple replicas would interleave writes).
  replicas: 1
  selector:
    matchLabels:
      app: webhook-receiver
  template:
    metadata:
      labels:
        app: webhook-receiver
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: webhook-receiver
          image: ghcr.io/fluv/deepseek-receiver:main@sha256:f0fc8b0967372f0b6ca6647726463547f8a20600af66d110067ad9bbeaeb8875
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: deepseek-reviewer-app
                  key: webhook-secret
            - name: GITHUB_APP_ID
              valueFrom:
                secretKeyRef:
                  name: deepseek-reviewer-app
                  key: app-id
            - name: GITHUB_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: deepseek-reviewer-app
                  key: private-key
            - name: BOT_LOGIN
              value: fluv-deepseek[bot]
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: deepseek
                  key: api-key
                  optional: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 10m
              memory: 128Mi
            limits:
              memory: 512Mi
