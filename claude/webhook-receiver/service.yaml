# Service exposes the webhook-receiver pod on port 80 (named `http`).
# Behind the public ingress at webhook.k3s.fluv.net/github.
apiVersion: v1
kind: Service
metadata:
  name: webhook-receiver
  namespace: claude
spec:
  selector:
    app: webhook-receiver
  ports:
    - name: http
      port: 80
      targetPort: http
