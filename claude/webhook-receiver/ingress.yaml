apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: webhook-receiver
  namespace: claude
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - webhook.k3s.fluv.net
      secretName: webhook-receiver-tls
  rules:
    - host: webhook.k3s.fluv.net
      http:
        paths:
          - path: /github/deepseek
            pathType: Exact
            backend:
              service:
                name: webhook-receiver
                port:
                  name: http
          - path: /healthz
            pathType: Exact
            backend:
              service:
                name: webhook-receiver
                port:
                  name: http
