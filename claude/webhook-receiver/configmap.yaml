apiVersion: v1
kind: ConfigMap
metadata:
  name: webhook-receiver-script
  namespace: claude
data:
  script.py: |
    """GitHub webhook receiver with DeepSeek PR review handler.

    v4: Migrates to dedicated deepseek-reviewer GitHub App (org-wide installation).
    v3: Adds repo contents snapshot via git tree API (fluv/kube#268).
    v2: Routes pull_request / issue_comment events to the DS pipeline.
    v1: Smoke-test (HMAC verification, logging).

    DS reviews post as GitHub PR reviews under deepseek-reviewer[bot]. The
    DeepSeek API key is optional — pod starts normally without it but DS
    reviews are skipped.
    """
    import asyncio
    import base64
    import hashlib
    import hmac
    import json
    import logging
    import os
    import time
    import urllib.request
    import urllib.error
    from datetime import datetime, timezone

    from aiohttp import web
    import jwt  # PyJWT — pip-installed at container startup
    from prometheus_client import Counter, Histogram, generate_latest, CONTENT_TYPE_LATEST

    logging.basicConfig(level=logging.INFO, format="%(asctime)s %(levelname)s %(message)s")
    log = logging.getLogger("webhook")

    # --- Config ---

    WEBHOOK_SECRET = os.environ["WEBHOOK_SECRET"].encode()
    APP_ID = os.environ.get("GITHUB_APP_ID", "")
    PRIVATE_KEY = os.environ.get("GITHUB_PRIVATE_KEY", "")
    DEEPSEEK_API_KEY = os.environ.get("DEEPSEEK_API_KEY", "")
    BOT_LOGIN = os.environ.get("BOT_LOGIN", "claude-zuzak[bot]")
    PROMPT_TEMPLATE_TTL = 3600  # seconds

    DS_ENABLED = bool(APP_ID and PRIVATE_KEY and DEEPSEEK_API_KEY)
    if not DS_ENABLED:
        log.warning("DS review disabled — GITHUB_APP_ID / GITHUB_PRIVATE_KEY / "
                    "DEEPSEEK_API_KEY not all set")

    # Per-repo config — mirrors each repo's deepseek-review.yml inputs.
    REPO_CONFIG = {
        "fluv/claude": {
            "label_deadlock": "vet:deadlock",
            "skip_prefixes": {"dot-claude/projects/"},
            "exclude_prefixes": {"projects/", "dot-claude/projects/"},
            "model_push": "deepseek-v4-flash",
            "model_recheck": "deepseek-v4-pro",
        },
        "fluv/kube": {
            "label_deadlock": "vet:deadlock",
            "skip_prefixes": set(),
            # Exclude the webhook receiver script itself — it contains DS template
            # placeholder strings that confuse DS's own prompt-building step.
            "exclude_prefixes": {"claude/webhook-receiver/"},
            "model_push": "deepseek-reasoner",
            "model_recheck": "deepseek-reasoner",
        },
    }
    DEFAULT_CONFIG = {
        "label_deadlock": "",
        "skip_prefixes": set(),
        "exclude_prefixes": set(),
        "model_push": "deepseek-v4-flash",
        "model_recheck": "deepseek-v4-pro",
    }

    # --- Metrics ---

    webhook_events_total = Counter(
        "webhook_receiver_events_total",
        "Webhook events received",
        ["event", "action"],
    )
    reviews_posted_total = Counter(
        "webhook_receiver_reviews_posted_total",
        "DS reviews successfully posted",
        ["verdict"],
    )
    review_errors_total = Counter(
        "webhook_receiver_review_errors_total",
        "DS review pipeline errors",
        ["stage"],
    )
    webhook_to_comment_seconds = Histogram(
        "webhook_to_comment_seconds",
        "Seconds from webhook event receipt (post-HMAC) to review posted",
        buckets=[10, 20, 30, 45, 60, 90, 120, 180, 300],
    )
    repo_snapshot_errors_total = Counter(
        "webhook_receiver_repo_snapshot_errors_total",
        "Snapshot pipeline errors by stage",
        ["stage"],
    )

    # Strong reference set — prevents asyncio tasks from being GC'd mid-flight.
    # Tasks remove themselves via add_done_callback(discard).
    _background_tasks: set = set()

    # --- HMAC ---

    def _verify_sig(body: bytes, header: str) -> bool:
        if not header or not header.startswith("sha256="):
            return False
        expected = "sha256=" + hmac.new(WEBHOOK_SECRET, body, hashlib.sha256).hexdigest()
        return hmac.compare_digest(expected, header)

    # --- GitHub App auth ---

    _gh_token: str = ""
    _gh_token_expiry: float = 0.0
    _installation_id: str = ""

    def _make_jwt() -> str:
        now = int(time.time())
        return jwt.encode(
            {"iat": now - 60, "exp": now + 600, "iss": APP_ID},
            PRIVATE_KEY,
            algorithm="RS256",
        )

    def _discover_installation_id() -> str:
        j = _make_jwt()
        req = urllib.request.Request("https://api.github.com/app/installations")
        req.add_header("Authorization", f"Bearer {j}")
        req.add_header("Accept", "application/vnd.github.v3+json")
        req.add_header("User-Agent", "zuzak-webhook-receiver/2.0")
        with urllib.request.urlopen(req, timeout=30) as resp:
            installations = json.load(resp)
        if not installations:
            raise RuntimeError("No installations found for this GitHub App")
        return str(installations[0]["id"])

    def _get_gh_token() -> str:
        global _gh_token, _gh_token_expiry, _installation_id
        now = time.time()
        if _gh_token and now < _gh_token_expiry - 120:
            return _gh_token
        if not _installation_id:
            _installation_id = _discover_installation_id()
        j = _make_jwt()
        url = f"https://api.github.com/app/installations/{_installation_id}/access_tokens"
        req = urllib.request.Request(url, method="POST", data=b"{}")
        req.add_header("Authorization", f"Bearer {j}")
        req.add_header("Accept", "application/vnd.github.v3+json")
        req.add_header("User-Agent", "zuzak-webhook-receiver/2.0")
        with urllib.request.urlopen(req, timeout=30) as resp:
            data = json.load(resp)
        _gh_token = data["token"]
        _gh_token_expiry = now + 3600
        return _gh_token

    def _gh(path: str, method: str = "GET", body=None):
        token = _get_gh_token()
        url = f"https://api.github.com{path}"
        data = json.dumps(body).encode() if body else None
        req = urllib.request.Request(url, method=method, data=data)
        req.add_header("Authorization", f"Bearer {token}")
        req.add_header("Accept", "application/vnd.github.v3+json")
        req.add_header("Content-Type", "application/json")
        req.add_header("User-Agent", "zuzak-webhook-receiver/2.0")
        with urllib.request.urlopen(req, timeout=30) as resp:
            return json.load(resp)

    # --- Prompt template cache ---

    _prompt_template: str = ""
    _prompt_template_fetched_at: float = 0.0

    def _get_prompt_template() -> str:
        global _prompt_template, _prompt_template_fetched_at
        now = time.time()
        if _prompt_template and now < _prompt_template_fetched_at + PROMPT_TEMPLATE_TTL:
            return _prompt_template
        data = _gh("/repos/fluv/deepseek-review-action/contents/prompt-template.md")
        _prompt_template = base64.b64decode(data["content"]).decode()
        _prompt_template_fetched_at = now
        return _prompt_template

    # --- DS pipeline helpers ---

    def _get_patch(repo: str, base_ref: str, head_sha: str) -> str:
        token = _get_gh_token()
        url = f"https://api.github.com/repos/{repo}/compare/{base_ref}...{head_sha}"
        req = urllib.request.Request(url)
        req.add_header("Authorization", f"Bearer {token}")
        req.add_header("Accept", "application/vnd.github.v3.diff")
        req.add_header("User-Agent", "zuzak-webhook-receiver/2.0")
        with urllib.request.urlopen(req, timeout=30) as resp:
            return resp.read().decode("utf-8", errors="replace")

    def _get_repo_context(repo: str, head_sha: str) -> str:
        """Fetch .github/deepseek/*.md repo-specific context files."""
        try:
            items = _gh(f"/repos/{repo}/contents/.github/deepseek?ref={head_sha}")
            parts = []
            for item in sorted(items, key=lambda x: x["name"]):
                if item["name"].endswith(".md"):
                    blob = _gh(f"/repos/{repo}/git/blobs/{item['sha']}")
                    parts.append(base64.b64decode(blob["content"]).decode())
            return "\n".join(parts)
        except Exception:
            return ""

    def _get_repo_snapshot(repo: str, head_sha: str, exclude_prefixes: set,
                           max_bytes: int = 400_000) -> str:
        """Fetch repo files at head_sha for the repo-contents prompt snapshot.
        400KB cap, paths sorted, file-header per entry, truncation note at end.
        Skips paths matching any exclude prefix."""
        try:
            tree = _gh(f"/repos/{repo}/git/trees/{head_sha}?recursive=1")
        except Exception as e:
            log.warning("repo snapshot tree fetch failed repo=%s: %s", repo, e)
            repo_snapshot_errors_total.labels(stage="tree").inc()
            return "_(repository snapshot unavailable)_"

        chunks = []
        total = 0
        truncated = False
        for item in sorted(tree.get("tree", []), key=lambda x: x["path"]):
            if item.get("type") != "blob":
                continue
            path = item["path"]
            if any(path.startswith(p) for p in exclude_prefixes):
                continue
            try:
                blob = _gh(f"/repos/{repo}/git/blobs/{item['sha']}")
            except Exception:
                repo_snapshot_errors_total.labels(stage="blob").inc()
                continue
            try:
                if blob.get("encoding") == "base64":
                    content = base64.b64decode(blob["content"]).decode("utf-8", errors="replace")
                else:
                    content = blob.get("content", "")
            except Exception:
                repo_snapshot_errors_total.labels(stage="decode").inc()
                continue
            chunk = f"=== {path} ===\n{content}\n"
            if total + len(chunk) > max_bytes:
                truncated = True
                break
            chunks.append(chunk)
            total += len(chunk)
        if truncated:
            chunks.append(f"\n_(remaining files truncated at {max_bytes} bytes)_\n")
        return "".join(chunks)

    def _get_prior_thread(repo: str, pr_number: int) -> str:
        comments = _gh(f"/repos/{repo}/issues/{pr_number}/comments?per_page=100")
        if not comments:
            return "_(empty — this is the first review round.)_"
        return "\n".join(
            f"### {c['user']['login']} — {c['created_at']}\n\n{c['body']}\n"
            for c in comments
        )

    def _get_pr_labels(repo: str, pr_number: int) -> str:
        pr = _gh(f"/repos/{repo}/pulls/{pr_number}")
        labels = [lb["name"] for lb in pr.get("labels", [])]
        return ", ".join(labels) if labels else "(none)"

    def _dismiss_changes_requested(repo: str, pr_number: int) -> None:
        reviews = _gh(f"/repos/{repo}/pulls/{pr_number}/reviews?per_page=100")
        for r in reviews:
            if r["user"]["login"] == BOT_LOGIN and r["state"] == "CHANGES_REQUESTED":
                try:
                    _gh(
                        f"/repos/{repo}/pulls/{pr_number}/reviews/{r['id']}/dismissals",
                        method="PUT",
                        body={"message": "DS posted a clean verdict — dismissing prior CHANGES_REQUESTED"},
                    )
                except Exception as e:
                    log.warning("dismiss_changes_requested failed review=%s: %s", r["id"], e)

    def _apply_label(repo: str, pr_number: int, label: str) -> None:
        if not label:
            return
        try:
            _gh(f"/repos/{repo}/labels", method="POST", body={
                "name": label, "color": "B60205",
                "description": "DS/author impasse",
            })
        except urllib.error.HTTPError as e:
            if e.code != 422:  # 422 = label already exists; anything else is unexpected
                log.warning("create label %r failed: %s", label, e)
        except Exception as e:
            log.warning("create label %r failed: %s", label, e)
        try:
            _gh(f"/repos/{repo}/issues/{pr_number}/labels",
                method="POST", body={"labels": [label]})
        except Exception as e:
            log.warning("apply label %r to pr=%d failed: %s", label, pr_number, e)

    def _call_deepseek(prompt: str, model: str) -> dict:
        payload = json.dumps({
            "model": model,
            "messages": [{"role": "user", "content": prompt}],
        }).encode()
        req = urllib.request.Request(
            "https://api.deepseek.com/chat/completions",
            method="POST",
            data=payload,
        )
        req.add_header("Authorization", f"Bearer {DEEPSEEK_API_KEY}")
        req.add_header("Content-Type", "application/json")
        req.add_header("User-Agent", "zuzak-webhook-receiver/2.0")
        with urllib.request.urlopen(req, timeout=120) as resp:
            return json.load(resp)

    # --- Review pipeline ---

    def _review_pr(repo: str, pr_number: int, head_sha: str, base_ref: str,
                   is_recheck: bool, cfg: dict, pr_author: str = "",
                   start: float = 0.0) -> None:
        if not start:
            start = time.monotonic()
        log.info("ds_review repo=%s pr=%d head=%.8s recheck=%s author=%s",
                 repo, pr_number, head_sha, is_recheck, pr_author)

        try:
            patch = _get_patch(repo, base_ref, head_sha)
        except Exception as e:
            log.error("patch fetch failed pr=%d: %s", pr_number, e)
            review_errors_total.labels(stage="patch").inc()
            return

        if not patch:
            log.info("empty patch pr=%d — skip", pr_number)
            return
        if len(patch) > 200_000:
            log.info("patch too large %d bytes pr=%d — skip", len(patch), pr_number)
            return

        skip_pfx = cfg.get("skip_prefixes", set())
        if skip_pfx:
            changed = [ln[6:] for ln in patch.splitlines() if ln.startswith("+++ b/")]
            if any(any(p.startswith(pfx) for pfx in skip_pfx) for p in changed):
                log.info("skip_prefix match pr=%d", pr_number)
                return

        try:
            repo_context = _get_repo_context(repo, head_sha)
        except Exception:
            repo_context = ""
        try:
            prior_thread = _get_prior_thread(repo, pr_number)
        except Exception:
            prior_thread = "_(unavailable)_"
        try:
            labels = _get_pr_labels(repo, pr_number)
        except Exception:
            labels = "(unavailable)"

        try:
            repo_contents = _get_repo_snapshot(
                repo, head_sha, cfg.get("exclude_prefixes", set())
            )
        except Exception as e:
            log.warning("repo snapshot failed pr=%d: %s", pr_number, e)
            repo_contents = "_(repository snapshot unavailable)_"

        trigger = "recheck" if is_recheck else "first-or-push"
        model_key = "model_recheck" if is_recheck else "model_push"
        model = cfg.get(model_key, "deepseek-v4-flash")

        try:
            template = _get_prompt_template()
        except Exception as e:
            log.error("prompt template fetch failed pr=%d: %s", pr_number, e)
            review_errors_total.labels(stage="template").inc()
            return

        prompt = (template
                  .replace("{{REPO_CONTEXT}}", repo_context)
                  .replace("{{TRIGGER}}", trigger)
                  .replace("{{PR_LABELS}}", labels)
                  .replace("{{PRIOR_REVIEW_THREAD}}", prior_thread)
                  .replace("{{REPO_CONTENTS}}", repo_contents)
                  .replace("{{PATCH}}", patch))

        log.info("calling deepseek model=%s prompt_len=%d pr=%d", model, len(prompt), pr_number)
        try:
            response = _call_deepseek(prompt, model)
        except Exception as e:
            log.error("deepseek call failed pr=%d: %s", pr_number, e)
            review_errors_total.labels(stage="deepseek").inc()
            return

        if "error" in response:
            log.error("deepseek error pr=%d: %s", pr_number, response.get("error"))
            review_errors_total.labels(stage="deepseek").inc()
            return

        body = response["choices"][0]["message"]["content"]
        actual_model = response.get("model", model)

        # Parse verdict marker from DS response before appending attribution footer;
        # parsing after would always match the footer line instead.
        last_line = body.strip().split("\n")[-1]
        impasse = last_line == "<!-- IMPASSE -->"
        request_changes = last_line == "<!-- REQUEST CHANGES -->"
        approve = last_line == "<!-- APPROVE -->"

        body += (
            f"\n\n_Reviewed by {actual_model} against "
            f"https://github.com/{repo}/compare/{base_ref}...{head_sha}"
            f" with prior review thread as continuity_"
        )

        if not request_changes and not impasse:
            _dismiss_changes_requested(repo, pr_number)

        verdict = ("impasse" if impasse else "request_changes" if request_changes
                   else "approve" if approve else "comment")

        try:
            if impasse:
                _apply_label(repo, pr_number, cfg.get("label_deadlock", ""))
                _gh(f"/repos/{repo}/pulls/{pr_number}/reviews",
                    method="POST",
                    body={"commit_id": head_sha, "body": body, "event": "COMMENT"})
            elif request_changes:
                _gh(f"/repos/{repo}/pulls/{pr_number}/reviews",
                    method="POST",
                    body={"commit_id": head_sha, "body": body, "event": "REQUEST_CHANGES"})
            elif approve:
                _gh(f"/repos/{repo}/pulls/{pr_number}/reviews",
                    method="POST",
                    body={"commit_id": head_sha, "body": body, "event": "APPROVE"})
            else:
                _gh(f"/repos/{repo}/pulls/{pr_number}/reviews",
                    method="POST",
                    body={"commit_id": head_sha, "body": body, "event": "COMMENT"})
        except Exception as e:
            log.error("post review failed pr=%d verdict=%s: %s", pr_number, verdict, e)
            review_errors_total.labels(stage="post").inc()
            return

        elapsed = time.monotonic() - start
        webhook_to_comment_seconds.observe(elapsed)
        reviews_posted_total.labels(verdict=verdict).inc()
        log.info("review posted pr=%d verdict=%s model=%s elapsed=%.1fs",
                 pr_number, verdict, actual_model, elapsed)

    # --- HTTP handlers ---

    async def github_handler(request: web.Request) -> web.Response:
        body = await request.read()
        sig = request.headers.get("X-Hub-Signature-256", "")
        if not _verify_sig(body, sig):
            log.warning("hmac_fail remote=%s", request.remote)
            return web.Response(status=401)

        event = request.headers.get("X-GitHub-Event", "unknown")
        delivery = request.headers.get("X-GitHub-Delivery", "")
        payload = json.loads(body)
        repo = payload.get("repository", {}).get("full_name", "?")
        action = payload.get("action", "")

        log.info(
            "event=%s action=%s repo=%s delivery=%s received_at=%s",
            event, action, repo, delivery,
            datetime.now(timezone.utc).isoformat(),
        )
        webhook_events_total.labels(event=event, action=action).inc()

        if DS_ENABLED:
            cfg = REPO_CONFIG.get(repo, DEFAULT_CONFIG)

            if event == "pull_request" and action in ("opened", "synchronize", "reopened"):
                pr = payload["pull_request"]
                event_start = time.monotonic()
                task = asyncio.create_task(asyncio.to_thread(
                    _review_pr,
                    repo, pr["number"], pr["head"]["sha"], pr["base"]["ref"],
                    False, cfg,
                    pr["user"]["login"],
                    event_start,
                ))
                _background_tasks.add(task)
                task.add_done_callback(_background_tasks.discard)
                task.add_done_callback(
                    lambda t: log.error("review task raised: %s", t.exception())
                    if t.exception() else None
                )

            elif (event == "pull_request" and action == "review_requested"
                  and payload.get("requested_reviewer", {}).get("login") == BOT_LOGIN):
                pr = payload["pull_request"]
                event_start = time.monotonic()
                task = asyncio.create_task(asyncio.to_thread(
                    _review_pr,
                    repo, pr["number"], pr["head"]["sha"], pr["base"]["ref"],
                    True, cfg,
                    pr["user"]["login"],
                    event_start,
                ))
                _background_tasks.add(task)
                task.add_done_callback(_background_tasks.discard)
                task.add_done_callback(
                    lambda t: log.error("review task raised: %s", t.exception())
                    if t.exception() else None
                )

        return web.Response(status=204)

    async def metrics_handler(request: web.Request) -> web.Response:
        return web.Response(
            body=generate_latest(),
            headers={"Content-Type": CONTENT_TYPE_LATEST},
        )

    async def healthz(request: web.Request) -> web.Response:
        return web.Response(text="ok")

    def main() -> None:
        app = web.Application()
        app.router.add_post("/github/deepseek", github_handler)
        app.router.add_get("/metrics", metrics_handler)
        app.router.add_get("/healthz", healthz)
        web.run_app(app, host="0.0.0.0", port=8080, access_log=None)

    if __name__ == "__main__":
        main()
